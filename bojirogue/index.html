<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boji Rogue</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Noto Sans JP", system-ui, sans-serif;
        background: radial-gradient(circle at 20% 20%, #2d2d4a, #141422 55%, #0b0b12);
        color: #f4f4ff;
      }

      .panel {
        width: min(680px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        background: rgba(8, 8, 14, 0.8);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 44px);
        letter-spacing: 0.04em;
      }

      p {
        margin: 0;
        line-height: 1.8;
        color: rgba(244, 244, 255, 0.92);
      }

      .badge {
        display: inline-block;
        margin-bottom: 14px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(143, 126, 255, 0.25);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <span class="badge">new page</span>
      <h1>Boji Rogue</h1>
      <p>
        既存ファイルには手を入れず、<code>/bojirogue/index.html</code>
        を新規作成しました。ここをベースにページ内容を拡張できます。
      </p>
    </main>
  </body>
</html>
