name: Bump APP_VERSION

on:
  push:
    branches:
      - main
    paths:
      - "index.html"

permissions:
  contents: write

jobs:
  bump-version:
    if: "!contains(github.event.head_commit.message, '[skip version bump]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump APP_VERSION
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          pattern = r'const APP_VERSION = "build-#(\d+)";'
          match = re.search(pattern, text)

          if not match:
              raise SystemExit("APP_VERSION not found")

          current = int(match.group(1))
          next_version = current + 1

          text = re.sub(
              pattern,
              f'const APP_VERSION = "build-#{next_version}";',
              text,
              count=1
          )

          path.write_text(text, encoding="utf-8")
          print(f"build-#{current} -> build-#{next_version}")
          PY

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Bump APP_VERSION [skip version bump]"
          git push
