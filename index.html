<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぼじろーぐ</title>
  <style>
    :root { --bg:#111; --panel:#1b1b1b; --text:#f2f2f2; --accent:#7ad1ff; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:var(--bg); color:var(--text); font-family:system-ui,"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif; padding:12px; }
    .wrap { width:min(100%,980px); background:var(--panel); border:1px solid #333; border-radius:10px; padding:12px; box-shadow:0 8px 30px rgba(0,0,0,.35); }
    h1 { margin:0 0 8px; color:var(--accent); font-size:20px; }
    #grid { position:relative; margin:0; display:grid; grid-template-columns:repeat(40,24px); grid-auto-rows:24px; width:fit-content; background:#0d0d0d; border:1px solid #444; padding:8px; overflow:auto; user-select:none; min-height:calc(25 * 24px + 16px); }
    #projectile-layer { position:absolute; inset:0; pointer-events:none; z-index:2; }
    .projectile { position:absolute; width:24px; height:24px; line-height:24px; text-align:center; font-size:20px; }
    .cell { width:24px; height:24px; line-height:24px; text-align:center; font-size:20px; }
    #status { margin-top:8px; padding:8px; border:1px solid #3b3b3b; background:#141414; font-size:16px; line-height:1.45; white-space:normal; }
    .row { display:flex; gap:24px; align-items:center; flex-wrap:wrap; }
    .monster-alert { color:#ff5252; font-weight:700; }
    .stat { display:flex; align-items:center; gap:6px; }
    .label { min-width:2.2em; }
    .meter { width:180px; height:12px; border:1px solid #666; background:#242424; border-radius:3px; overflow:hidden; }
    .fill { display:block; height:100%; width:0; background:#2ecc71; border-radius:inherit; }
    .tone-yellow .fill { background:#2ecc71; }
    .tone-orange .fill { background:#ff9800; }
    .tone-red .fill { background:#b53b2f; }
    .tone-yellow .num { color:#2ecc71; }
    .tone-orange .num { color:#ff9800; }
    .tone-red .num { color:#e74c3c; }
    .meter.tone-red { border-color:#e74c3c; }
    #log { margin-top:8px; border:1px solid #3b3b3b; background:#101010; padding:8px; font-size:14px; line-height:1.35; }
    #log-latest { min-height:40px; border-bottom:1px solid #2f2f2f; margin-bottom:6px; padding-bottom:4px; }
    #log-history { max-height:160px; overflow-y:auto; }
    #help { margin-top:8px; color:#ccc; font-size:13px; }
    .line { margin-bottom:3px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 id="app-title">ぼじろーぐ <span id="version"></span></h1>
    <div id="grid" aria-label="game map" role="img"></div>
    <div id="status"></div>
    <div id="log">
      <div id="log-latest"></div>
      <div id="log-history"></div>
    </div>
    <div id="help">操作: ↑↓←→移動 / Space 待機 / A いぼビーム / B イボ食い / 1-5 アイテム使用 / R リスタート</div>
  </main>

  <script>
    "use strict";

    const WIDTH = 40;
    const HEIGHT = 25;
    const MAX_LOG = 100;
    const TILE_WALL = "#";
    const TILE_FLOOR = ".";
    const PROJECTILE_STEP_MS = 40;
    const CELL_SIZE = 24;
    const GRID_PADDING = 8;
    const APP_VERSION = "v1.21";

    const SPRITES = {
      player:"🧔", wall:"🧱", floor:".", ladder:"🪜", orb:"🟣", starBeam:"✨",
      dog:"🐕", wolf:"🐺", lion:"🦁", dragon:"🐉", ghost:"👻", zombie:"🧟", skull:"☠️", invader:"👾", spider:"🕷️", chick:"🐥", mimic:"🎁", rain:"🌧️",
      food:"🍙", meat:"🥩", sushi:"🍣", feast:"🍖", potion:"🧪", map:"👁", shield:"🛡️", axe:"🪓", diamond:"💎", dagger:"🗡️", star:"🌟", sun:"🌤️", poop:"💩", bean:"🫘", asahiyama:"🏔️"
    };

    const ENEMY_DEFS = [
      {id:1,key:"dog",char:SPRITES.dog,baseHp:6,baseAtk:2,baseDef:0,exp:1,score:10,dropRuleRef:"enemyCommon"},
      {id:2,key:"wolf",char:SPRITES.wolf,baseHp:10,baseAtk:4,baseDef:1,exp:3,score:35,dropRuleRef:"enemyCommon"},
      {id:3,key:"lion",char:SPRITES.lion,baseHp:12,baseAtk:6,baseDef:2,exp:5,score:60,dropRuleRef:"enemyCommon"},
      {id:4,key:"dragon",char:SPRITES.dragon,baseHp:20,baseAtk:8,baseDef:3,exp:10,score:120,dropRuleRef:"enemyCommon"},
      {id:5,key:"ghost",char:SPRITES.ghost,baseHp:12,baseAtk:4,baseDef:1,exp:6,score:70,dropRuleRef:"enemyCommon"},
      {id:6,key:"zombie",char:SPRITES.zombie,baseHp:13,baseAtk:4,baseDef:1,exp:5,score:45,dropRuleRef:"enemyCommon"},
      {id:7,key:"skull",char:SPRITES.skull,baseHp:15,baseAtk:5,baseDef:1,exp:7,score:80,dropRuleRef:"enemyCommon"},
      {id:8,key:"invader",char:SPRITES.invader,baseHp:18,baseAtk:8,baseDef:3,exp:15,score:160,dropRuleRef:"enemyCommon"},
      {id:9,key:"spider",char:SPRITES.spider,baseHp:7,baseAtk:4,baseDef:1,exp:3,score:30,dropRuleRef:"enemyCommon"},
      {id:10,key:"chick",char:SPRITES.chick,baseHp:100,baseAtk:0,baseDef:1,exp:50,score:0,dropRule:{mode:"none"}},
      {id:11,key:"mimic",char:SPRITES.mimic,baseHp:15,baseAtk:7,baseDef:2,exp:8,score:90,dropRuleRef:"mimicRare",flags:["specialDrop"]},
      {id:12,key:"rain",char:SPRITES.rain,baseHp:10,baseAtk:0,baseDef:1,exp:5,score:55,dropRuleRef:"enemyCommon"}
    ];

    const ITEM_DEFS = [
      {id:1,key:"food",char:SPRITES.food,category:"food",rarity:1,effectKey:"food",pickupMode:"inventory"},
      {id:2,key:"meat",char:SPRITES.meat,category:"food",rarity:1,effectKey:"meat",pickupMode:"inventory"},
      {id:3,key:"sushi",char:SPRITES.sushi,category:"food",rarity:2,effectKey:"sushi",pickupMode:"inventory"},
      {id:4,key:"feast",char:SPRITES.feast,category:"food",rarity:4,effectKey:"feast",pickupMode:"inventory"},
      {id:5,key:"potion",char:SPRITES.potion,category:"heal",rarity:1,effectKey:"potion",pickupMode:"inventory"},
      {id:6,key:"map",char:SPRITES.map,category:"utility",rarity:2,effectKey:"map",pickupMode:"inventory"},
      {id:7,key:"sun",char:SPRITES.sun,category:"utility",rarity:2,effectKey:"sun",pickupMode:"instant"},
      {id:8,key:"shield",char:SPRITES.shield,category:"armor",rarity:3,effectKey:"shield",pickupMode:"instant"},
      {id:9,key:"axe",char:SPRITES.axe,category:"weapon",rarity:3,effectKey:"axe",pickupMode:"inventory"},
      {id:10,key:"diamond",char:SPRITES.diamond,category:"armor",rarity:3,effectKey:"diamond",pickupMode:"inventory"},
      {id:11,key:"dagger",char:SPRITES.dagger,category:"weapon",rarity:3,effectKey:"dagger",pickupMode:"instant"},
      {id:12,key:"star",char:SPRITES.star,category:"utility",rarity:5,effectKey:"star",pickupMode:"inventory"},
      {id:13,key:"poop",char:SPRITES.poop,category:"junk",rarity:2,effectKey:"poop",pickupMode:"inventory"},
      {id:14,key:"bean",char:SPRITES.bean,category:"growth",rarity:4,effectKey:"bean",pickupMode:"instant"}
    ];
    const ITEM_DEF_BY_KEY = Object.fromEntries(ITEM_DEFS.map((d)=>[d.key,d]));
    const ITEM_DEF_BY_ID = Object.fromEntries(ITEM_DEFS.map((d)=>[d.id,d]));

    function itemDefByKey(key){ return ITEM_DEF_BY_KEY[key] || null; }
    function itemDefById(id){ return ITEM_DEF_BY_ID[id] || null; }
    function itemKeyFromDropEntry(entry){
      if(!entry) return null;
      if(entry.key) return entry.key;
      if(entry.type) return entry.type;
      if(entry.id !== undefined){
        const byId = itemDefById(entry.id);
        return byId ? byId.key : null;
      }
      return null;
    }
    function normalizeDropPool(pool=[]){
      return pool
        .map((entry)=>({key:itemKeyFromDropEntry(entry), weight:entry.weight ?? entry.rate ?? entry.w ?? 0}))
        .filter((entry)=>entry.key && entry.weight>0);
    }

    const DROP_MODE = {PROFILE:"profile", FIXED:"fixed", POOL:"pool", NONE:"none"};

    const DROP_PROFILES = {
      // 旧テーブルをそのまま移植。重みは旧rate相当。
      floorCommon: normalizeDropPool([
        {key:"food",weight:0.15}, {key:"meat",weight:0.14}, {key:"sushi",weight:0.13}, {key:"potion",weight:0.18},
        {key:"map",weight:0.07}, {key:"sun",weight:0.06}, {key:"diamond",weight:0.05}, {key:"axe",weight:0.05},
        {key:"dagger",weight:0.05}, {key:"shield",weight:0.05}, {key:"feast",weight:0.02}, {key:"star",weight:0.01},
        {key:"poop",weight:0.04}
      ]),
      enemyCommon: normalizeDropPool([
        {key:"food",weight:0.13}, {key:"meat",weight:0.12}, {key:"sushi",weight:0.16}, {key:"potion",weight:0.22},
        {key:"map",weight:0.09}, {key:"sun",weight:0.06}, {key:"diamond",weight:0.035}, {key:"axe",weight:0.055},
        {key:"dagger",weight:0.035}, {key:"shield",weight:0.025}, {key:"feast",weight:0.02}, {key:"star",weight:0.01},
        {key:"poop",weight:0.04}
      ]),
      mimicRare: normalizeDropPool([
        {key:"potion",weight:0.06}, {key:"diamond",weight:0.15}, {key:"axe",weight:0.15}, {key:"dagger",weight:0.20},
        {key:"shield",weight:0.20}, {key:"feast",weight:0.10}, {key:"star",weight:0.05}, {key:"poop",weight:0.05}, {key:"bean",weight:0.04}
      ]),
      chestCommon: normalizeDropPool([
        {key:"potion",weight:0.45}, {key:"feast",weight:0.05}, {key:"map",weight:0.10}, {key:"sun",weight:0.10}, {key:"poop",weight:0.30}
      ]),
      starter: normalizeDropPool([
        {key:"meat",weight:0.20}, {key:"sushi",weight:0.20}, {key:"potion",weight:0.20}, {key:"diamond",weight:0.05},
        {key:"axe",weight:0.05}, {key:"dagger",weight:0.05}, {key:"shield",weight:0.05}, {key:"feast",weight:0.05},
        {key:"star",weight:0.01}, {key:"poop",weight:0.04}
      ])
    };

    const FLOOR_ITEM_RULE = {mode:DROP_MODE.PROFILE, ref:"floorCommon"};
    const ENEMY_DROP_CHANCE = 0.22;
    const ENEMY_DEFAULT_DROP_RULE = {mode:DROP_MODE.PROFILE, ref:"enemyCommon", chance:ENEMY_DROP_CHANCE};
    const CHEST_DROP_RULE = {mode:DROP_MODE.PROFILE, ref:"chestCommon"};
    const STARTER_DROP_RULE = {mode:DROP_MODE.PROFILE, ref:"starter"};

    const ENEMY_DEF_BY_KEY = Object.fromEntries(ENEMY_DEFS.map((d)=>[d.key,d]));
    const ENEMY_DEF_BY_ID = Object.fromEntries(ENEMY_DEFS.map((d)=>[d.id,d]));
    const ENEMY_KILL_KEYS = ENEMY_DEFS.map((d)=>d.key);

    function enemyDefByKey(key){ return ENEMY_DEF_BY_KEY[key] || null; }
    function enemyDefById(id){ return ENEMY_DEF_BY_ID[id] || null; }
    function enemyDefFromInstance(enemy){ return enemyDefByKey(enemy?.key || ""); }
    function buildEmptyKillMap(){ return Object.fromEntries(ENEMY_KILL_KEYS.map((key)=>[key,0])); }
    function enemyDropRule(defOrKey){
      const def = typeof defOrKey === "string" ? enemyDefByKey(defOrKey) : defOrKey;
      if(!def) return ENEMY_DEFAULT_DROP_RULE;
      if(def.dropRule) return def.dropRule;
      if(def.dropRuleRef) return {mode:DROP_MODE.PROFILE, ref:def.dropRuleRef, chance:ENEMY_DROP_CHANCE};
      return ENEMY_DEFAULT_DROP_RULE;
    }

    // 敵テーブル: 1〜9階はほぼ維持、13階以降を 13〜15 / 16+ に分割して
    // 後半の理不尽な尖りを抑えつつ終盤の圧は残す。
    const FLOOR_ENEMY_TABLES = [
      {min:1,max:2,pool:[{enemyKey:"dog",w:60},{enemyKey:"wolf",w:28},{enemyKey:"ghost",w:12}]},
      {min:3,max:4,pool:[{enemyKey:"dog",w:38},{enemyKey:"wolf",w:30},{enemyKey:"lion",w:16},{enemyKey:"ghost",w:8},{enemyKey:"spider",w:8}]},
      {min:5,max:8,pool:[{enemyKey:"wolf",w:32},{enemyKey:"lion",w:22},{enemyKey:"ghost",w:10},{enemyKey:"zombie",w:12},{enemyKey:"spider",w:7},{enemyKey:"rain",w:5},{enemyKey:"skull",w:5}]},
      {min:9,max:12,pool:[{enemyKey:"wolf",w:24},{enemyKey:"lion",w:26},{enemyKey:"dragon",w:10},{enemyKey:"ghost",w:8},{enemyKey:"zombie",w:14},{enemyKey:"spider",w:8},{enemyKey:"rain",w:6},{enemyKey:"skull",w:4}]},
      {min:13,max:15,pool:[
        {enemyKey:"lion",w:24},
        {enemyKey:"dragon",w:12},
        {enemyKey:"ghost",w:8},
        {enemyKey:"zombie",w:14},
        {enemyKey:"spider",w:10},
        {enemyKey:"rain",w:8},
        {enemyKey:"skull",w:10},
        {enemyKey:"chick",w:2}
      ]},
      {min:16,max:999,pool:[
        {enemyKey:"lion",w:22},
        {enemyKey:"dragon",w:14},
        {enemyKey:"ghost",w:7},
        {enemyKey:"zombie",w:12},
        {enemyKey:"spider",w:8},
        {enemyKey:"rain",w:7},
        {enemyKey:"skull",w:14},
        {enemyKey:"invader",w:8},
        {enemyKey:"chick",w:2}
      ]}
    ];

    const mapEl = document.getElementById("grid");
    const versionEl = document.getElementById("version");
    const statusEl = document.getElementById("status");
    const logLatestEl = document.getElementById("log-latest");
    const logHistoryEl = document.getElementById("log-history");
    const projectileLayer = document.createElement("div");
    if (versionEl) versionEl.textContent = APP_VERSION;
    projectileLayer.id = "projectile-layer";

    const INITIAL_PLAYER_PARAMS = Object.freeze({
      x:1,y:1,
      hp:18,maxHp:20,
      baseAtk:4,baseDef:2,
      hunger:450,hungerMax:500,
      ibo:0,iboMax:5,iboMaxCap:10,
      iboChanceDenom:100,iboChanceDenomMin:40,
      level:1,exp:0,walkCount:0,
      poison:false,diamondWard:false,
      floorAtkBuff:0,floorDefBuff:0,
      vision:6,visionMax:10,visionMin:3
    });

    const EMPTY_INVENTORY = [null,null,null,null,null];
    const createInitialPlayer = () => ({...INITIAL_PLAYER_PARAMS});

    // ===== Game state =====
    const state = {
      floor:1,map:[],rooms:[],enemies:[],items:[],chests:[],asahiyama:null,floorEventType:"normal",ladder:{x:0,y:0},logs:[],revealed:false,seen:[],visibleNow:[],gameOver:false,inputLocked:false,
      invSize:5,inventory:[...EMPTY_INVENTORY],bestScore:Number(localStorage.getItem("bojirogue_bestScore")||"0"),score:0,turns:0,
      floorHasShield:false,floorHasAxe:false,
      kills:buildEmptyKillMap(),
      player:createInitialPlayer(),
      iboCooldown:0,starving:false,hungerLowNotified:false
    };

    // ===== Core utilities =====
    const clamp01 = (v) => Math.max(0, Math.min(1, v));
    const randInt = (min,max) => Math.floor(Math.random()*(max-min+1))+min;
    function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
    const expToNextLevel = (level = state.player.level) => level * 3;
    const calcDamage = (atk,def) => Math.max(1, atk - Math.floor(def * 0.6) + randInt(-1,1));
    // base + floor buff を最終ステータスとして扱う
    const playerAtkValue = () => state.player.baseAtk + state.player.floorAtkBuff;
    const playerDefValue = () => state.player.baseDef + state.player.floorDefBuff;
    const applyFloorAtkBuffFromFinal = (buffedAtk) => {
      state.player.floorAtkBuff = Math.max(0, buffedAtk - state.player.baseAtk);
    };
    const applyFloorDefBuffFromFinal = (buffedDef) => {
      state.player.floorDefBuff = Math.max(0, buffedDef - state.player.baseDef);
    };
    function formatBuffStat(label, baseValue, buffedValue, icon) {
      const buff = buffedValue - baseValue;
      const buffText = buff > 0 ? `（+${buff}${icon}）` : "";
      return `${label} ${buffedValue}${buffText}`;
    }
    const meterPercent = (value,max) => max <= 0 ? 0 : Math.max(0, Math.min(100, Math.round(value/max*100)));
    const statusTone = (value,pct) => value <= 0 ? "tone-red" : (pct < 25 ? "tone-orange" : "tone-yellow");

    function renderLogs(){
      logLatestEl.innerHTML = state.logs.slice(0,2).map((m)=>`<div class="line">${m}</div>`).join("");
      logHistoryEl.innerHTML = state.logs.slice(2).map((m)=>`<div class="line">${m}</div>`).join("");
    }
    function addLog(message){ state.logs.unshift(message); if(state.logs.length>MAX_LOG) state.logs.pop(); renderLogs(); }
    function updateHungerWarning(){
      const hungerRatio = state.player.hunger / state.player.hungerMax;
      if(hungerRatio >= 0.5){
        state.hungerLowNotified = false;
        return;
      }
      if(hungerRatio <= 0.25 && !state.hungerLowNotified){
        state.hungerLowNotified = true;
        addLog("お腹がすいて、フラフラしてきた");
      }
    }
    const ITEM_PICKUP_MODE = {INVENTORY:"inventory", INSTANT:"instant"};

    function instantPickupLog(itemChar, detail){
      const edge = '<span style="color:#ff4d4f;font-weight:700;">◆</span>';
      const body = `${itemChar}を手に入れた❗️。(${detail})`;
      addLog(`${edge} <span style="color:#ffd9d9;font-weight:700;">${body}</span> ${edge}`);
    }

    function gaugeHtml(label, value, max) {
      const pct = meterPercent(value, max);
      const tone = statusTone(value, pct);
      return `<div class="stat ${tone}"><span class="label">${label}</span><div class="meter ${value<=0?"tone-red":""}"><div class="fill" style="width:${pct}%"></div></div><span class="num">${value}/${max}</span></div>`;
    }

    function invToString(){ return state.inventory.map((slot)=>slot?slot.char:"▢").join(" "); }

    function calcScore(){
      const killScore = Object.entries(state.kills).reduce((sum,[k,count])=>sum + count * (enemyDefByKey(k)?.score || 0),0);
      return killScore + state.floor * 50 + state.player.level * 30;
    }

    function finalizeScore(reasonText=""){
      state.score = calcScore();
      if(state.score > state.bestScore){ state.bestScore = state.score; localStorage.setItem("bojirogue_bestScore", String(state.bestScore)); addLog(`新記録！ BEST ${state.bestScore} (${reasonText})`); }
      else addLog(`SCORE ${state.score} / BEST ${state.bestScore} (${reasonText})`);
    }

    function resetBestScore(){
      if(state.turns===0 || state.gameOver===true){
        state.bestScore = 0;
        localStorage.removeItem("bojirogue_bestScore");
        addLog("ハイスコアをリセットした。");
      }else{
        addLog("ハイスコアのリセットは開始前かゲームオーバー時のみ。");
      }
      render();
    }

    // ===== Map / floor generation =====
    function createMap() {
      const map = Array.from({length:HEIGHT},()=>Array(WIDTH).fill(TILE_WALL));
      const rooms=[]; const roomCount=randInt(6,10); let attempts=0;
      while(rooms.length<roomCount && attempts<120){
        attempts++;
        const w=randInt(4,8), h=randInt(3,6), x=randInt(1,WIDTH-w-2), y=randInt(1,HEIGHT-h-2);
        const room={x,y,w,h,cx:x+Math.floor(w/2),cy:y+Math.floor(h/2)};
        const overlap = rooms.some((r)=>x-1<=r.x+r.w&&x+w+1>=r.x&&y-1<=r.y+r.h&&y+h+1>=r.y);
        if(overlap) continue;
        for(let yy=y;yy<y+h;yy++) for(let xx=x;xx<x+w;xx++) map[yy][xx]=TILE_FLOOR;
        if(rooms.length>0){ const prev=rooms[rooms.length-1]; carveCorridor(map, prev.cx, prev.cy, room.cx, room.cy); }
        rooms.push(room);
      }
      return {map, rooms};
    }

    function carveCorridor(map, x1,y1,x2,y2){
      let x=x1,y=y1;
      if(Math.random()<0.5){ while(x!==x2){map[y][x]=TILE_FLOOR; x += x<x2?1:-1;} while(y!==y2){map[y][x]=TILE_FLOOR; y += y<y2?1:-1;} }
      else { while(y!==y2){map[y][x]=TILE_FLOOR; y += y<y2?1:-1;} while(x!==x2){map[y][x]=TILE_FLOOR; x += x<x2?1:-1;} }
      map[y2][x2]=TILE_FLOOR;
    }

    function setupFloor(){
      const built = createMap();
      state.map=built.map; state.rooms=built.rooms; state.items=[]; state.enemies=[]; state.chests=[]; state.asahiyama=null; state.revealed=false;
      state.seen = Array.from({length:HEIGHT},()=>Array(WIDTH).fill(false));
      state.visibleNow = Array.from({length:HEIGHT},()=>Array(WIDTH).fill(false));
      state.floorHasShield=false; state.floorHasAxe=false;
      state.player.floorAtkBuff = 0; state.player.floorDefBuff = 0; state.player.diamondWard = false;
      state.inputLocked=false; state.iboCooldown=0;
      const startRoom=state.rooms[0]; state.player.x=startRoom.cx; state.player.y=startRoom.cy;
      let far=state.rooms[0],best=-1;
      for(const r of state.rooms){ const d=Math.abs(r.cx-startRoom.cx)+Math.abs(r.cy-startRoom.cy); if(d>best){best=d; far=r;} }
      state.ladder={x:far.cx,y:far.cy};
      state.floorEventType = determineFloorEvent();
      const enemyMultiplier = state.floorEventType === "monsterHouse" ? 5 : 1;
      const initialItemCount = state.floorEventType === "monsterHouse" ? 0 : null;
      placeEnemies(enemyMultiplier);
      placeExtraLadderRoomEnemy(far, enemyMultiplier);
      placeItems(initialItemCount);
      placeTreasureEventObjects();
      placeAsahiyama();
      addLog(`第${state.floor}階に降りた。`);
      if(state.floorEventType === "monsterHouse") addLog("！！なんという　まものの気配！！");
      render();
    }

    const isWalkable = (x,y) => x>=0&&x<WIDTH&&y>=0&&y<HEIGHT&&state.map[y][x]===TILE_FLOOR;
    const enemyAt = (x,y) => state.enemies.find((e)=>e.x===x&&e.y===y);
    const itemAt = (x,y) => state.items.find((i)=>i.x===x&&i.y===y);
    const chestAt = (x,y) => state.chests.find((c)=>c.x===x&&c.y===y);
    const asahiyamaAt = (x,y) => state.asahiyama && state.asahiyama.x===x && state.asahiyama.y===y ? state.asahiyama : null;

    function positionFree(x,y){
      if(!isWalkable(x,y)) return false;
      if(state.player.x===x&&state.player.y===y) return false;
      if(enemyAt(x,y)||itemAt(x,y)||chestAt(x,y)||asahiyamaAt(x,y)) return false;
      if(state.ladder.x===x&&state.ladder.y===y) return false;
      return true;
    }

    function randomFloorPos(){
      const cells=[];
      for(let y=1;y<HEIGHT-1;y++) for(let x=1;x<WIDTH-1;x++) if(state.map[y][x]===TILE_FLOOR) cells.push({x,y});
      return shuffle(cells);
    }

    function weightedPick(pool){
      if(!pool || !pool.length) return null;
      const total = pool.reduce((s,r)=>s + (r.weight ?? r.rate ?? r.w ?? 0),0);
      if(total<=0) return null;
      let roll = Math.random()*total;
      for(const row of pool){
        roll -= (row.weight ?? row.rate ?? row.w ?? 0);
        if(roll<=0) return row;
      }
      return pool[pool.length-1];
    }
    function rollFromTable(table){
      const row = weightedPick(table);
      return itemKeyFromDropEntry(row);
    }
    function weightedEnemyKey(pool){ const total=pool.reduce((s,r)=>s+r.w,0); let roll=Math.random()*total; for(const row of pool){ roll-=row.w; if(roll<=0) return row.enemyKey; } return pool[pool.length-1].enemyKey; }
    const spriteForItemKey = (itemKey) => {
      const def = itemDefByKey(itemKey);
      if(def) return def.char;
      return SPRITES[itemKey] || SPRITES.star;
    };

    function createItem(itemKey){
      const def = itemDefByKey(itemKey);
      if(!def) return {key:itemKey, char:spriteForItemKey(itemKey)};
      return {id:def.id, key:def.key, char:def.char, category:def.category, rarity:def.rarity, effectKey:def.effectKey, pickupMode:def.pickupMode || "inventory"};
    }

    function placeItemAt(itemKey,x,y){
      if(itemKey==="shield" && state.floorHasShield) return false;
      if(itemKey==="axe" && state.floorHasAxe) return false;
      if(!positionFree(x,y)) return false;
      state.items.push({x,y,...createItem(itemKey)});
      if(itemKey==="shield") state.floorHasShield=true;
      if(itemKey==="axe") state.floorHasAxe=true;
      return true;
    }

    function floorPowerTier(){ if(state.floor<=2)return 0; if(state.floor<=4)return 1; if(state.floor<=6)return 2; if(state.floor<=8)return 3; if(state.floor<=10)return 4; return 5+Math.floor((state.floor-10)/2); }

    function determineFloorEvent(){
      const hpLow = state.player.hp <= state.player.maxHp / 2;
      const hungerLow = state.player.hunger <= state.player.hungerMax / 2;
      if((hpLow || hungerLow || state.player.poison) && Math.random() < 0.1) return "asahiyama";
      const inventoryFull = state.inventory.every(Boolean);
      if(inventoryFull && Math.random() < 0.2) return "monsterHouse";
      return "normal";
    }

    function enemyPoolForFloor(){ return FLOOR_ENEMY_TABLES.find((row)=>state.floor>=row.min&&state.floor<=row.max).pool; }

    function spawnEnemy(type,x,y){
      const enemyKey = typeof type === "string" ? type : type?.key;
      const def = enemyDefByKey(enemyKey);
      if(!def) throw new Error(`Unknown enemy key: ${String(enemyKey)}`);
      const tier = floorPowerTier();

      // 後半のATK急上昇を抑える。
      // 以前は11階から実質的に強くなりすぎていたので、
      // 16階以降から緩やかに追加補正する。
      const lateAtkBonus = state.floor >= 16
        ? Math.floor((state.floor - 16) / 4) + 1
        : 0;

      return {
        x,
        y,
        id:def.id,
        key:def.key,
        char:def.char,
        exp:def.exp,
        score:def.score,
        dropRule:enemyDropRule(def),
        hp: def.baseHp + tier * 2 + Math.floor(Math.max(0, state.floor - 8) / 4),
        atk: def.baseAtk + Math.floor(tier / 2) + lateAtkBonus,
        def: def.baseDef + Math.floor(tier / 4),
        active:def.key!=="mimic"
      };
    }

    function placeEnemies(multiplier=1){
      const pool = randomFloorPos();

      // 前半はほぼ現状維持、10階以降の増加を緩やかにする。
      const baseCount = randInt(2,3);
      const floorBonus = state.floor <= 10
        ? Math.floor((state.floor - 1) * 0.5)
        : 4 + Math.floor((state.floor - 10) * 0.3);

      const count = (baseCount + floorBonus) * multiplier;
      const enemyPool = enemyPoolForFloor();
      let placed = 0;

      for(const p of pool){
        if(placed >= count) break;
        if(Math.abs(p.x-state.player.x)+Math.abs(p.y-state.player.y) < 4) continue;
        if(p.x===state.ladder.x && p.y===state.ladder.y) continue;

        const enemyKey = weightedEnemyKey(enemyPool);
        state.enemies.push(spawnEnemy(enemyKey,p.x,p.y));
        placed++;
      }
    }


    function placeExtraLadderRoomEnemy(ladderRoom, multiplier=1){
      if(!ladderRoom) return;
      const enemyPool = enemyPoolForFloor();
      const candidates=[];
      for(let y=Math.max(1,ladderRoom.y-1); y<=Math.min(HEIGHT-2, ladderRoom.y+ladderRoom.h); y++){
        for(let x=Math.max(1,ladderRoom.x-1); x<=Math.min(WIDTH-2, ladderRoom.x+ladderRoom.w); x++){
          if(!positionFree(x,y)) continue;
          if(Math.abs(x-state.player.x)+Math.abs(y-state.player.y)<6) continue;
          candidates.push({x,y});
        }
      }
      if(!candidates.length) return;
      const shuffled = shuffle(candidates);
      let placed = 0;
      for(const picked of shuffled){
        if(placed >= multiplier) break;
        const enemyKey = weightedEnemyKey(enemyPool);
        state.enemies.push(spawnEnemy(enemyKey,picked.x,picked.y));
        placed += 1;
      }
    }

    function placeItems(itemCountOverride=null){
      const pool=randomFloorPos(); const itemCount=itemCountOverride ?? randInt(1,3); let placed=0;
      for(const p of pool){
        if(placed>=itemCount) break;
        const type=resolveDropType(FLOOR_ITEM_RULE);
        if(!type) continue;
        if(placeItemAt(type,p.x,p.y)) placed++;
      }
    }

    function placeTreasureEventObjects(){
      if(state.floor % 5 !== 0) return;
      const total = randInt(2,3);
      let pool = randomFloorPos().filter((p)=>Math.abs(p.x-state.player.x)+Math.abs(p.y-state.player.y)>=4&&positionFree(p.x,p.y));
      if(!pool.length) pool = randomFloorPos().filter((p)=>positionFree(p.x,p.y));
      let placed = 0;
      for(const p of pool){
        if(placed>=total) break;
        if(Math.random()<0.5) state.enemies.push(spawnEnemy("mimic", p.x, p.y));
        else state.chests.push({x:p.x,y:p.y,char:SPRITES.mimic});
        placed += 1;
      }
    }



    function placeAsahiyama(){
      if(state.floorEventType !== "asahiyama") return;
      let pool = randomFloorPos().filter((p)=>positionFree(p.x,p.y));
      if(!pool.length) return;
      const picked = pool[randInt(0, pool.length-1)];
      state.asahiyama = {x:picked.x, y:picked.y, type:"asahiyama", char:SPRITES.asahiyama};
    }

    function triggerAsahiyama(asahiyama){
    
      if(!asahiyama) return;
      const beforeHp = state.player.hp;
      const beforeMaxHp = state.player.maxHp;
      const targetHp = Math.min(beforeMaxHp, Math.ceil((beforeHp + beforeMaxHp) / 2));
      state.player.hp = targetHp;
      const hpGain = state.player.hp - beforeHp;

      const expGoal = Math.max(0, expToNextLevel() - 1);
      const expGain = Math.max(0, expGoal - state.player.exp);
      state.player.exp += expGain;

      const usedSlots = state.inventory.filter(Boolean).length;
      const maxHpGain = Math.max(0, state.invSize - usedSlots);
      state.player.maxHp += maxHpGain;

      if(state.player.vision <= 5) state.player.vision = 6;
      if(state.player.poison) state.player.poison = false;

      addLog(`『おもいやり』HP回復${hpGain}　『進んで学習』EXP${expGain}　『たくましい』最大HP+${maxHpGain}`);
      addLog("あさひやまに登ると、身体に力がみなぎった。…あさひやまは静かに消え去った。");

      state.asahiyama = null;
      dropItemFromRule(asahiyama.x, asahiyama.y, FLOOR_ITEM_RULE);
    }

    // ===== Drop resolution =====
    function isItemPlacable(type){
      return !(type==="shield"&&state.floorHasShield) && !(type==="axe"&&state.floorHasAxe);
    }

    function allowedDropTable(table){
      return (table || []).filter((row)=>isItemPlacable(itemKeyFromDropEntry(row)));
    }

    function resolveDropType(rule){
      if(!rule || rule.mode===DROP_MODE.NONE) return null;
      if(rule.chance !== undefined && Math.random() >= rule.chance) return null;

      if(rule.mode === DROP_MODE.FIXED) return isItemPlacable(rule.item) ? rule.item : null;

      if(rule.mode === DROP_MODE.PROFILE){
        const profilePool = allowedDropTable(DROP_PROFILES[rule.ref] || []);
        return rollFromTable(profilePool);
      }

      if(rule.mode === DROP_MODE.POOL){
        const pool = allowedDropTable(normalizeDropPool(rule.pool || []));
        return rollFromTable(pool);
      }

      return null;
    }

    function updateSeen(){
      for(let y=0;y<HEIGHT;y++) for(let x=0;x<WIDTH;x++) state.visibleNow[y][x]=false;
      if(state.revealed){
        for(let y=0;y<HEIGHT;y++){
          for(let x=0;x<WIDTH;x++){
            state.visibleNow[y][x]=true;
            state.seen[y][x]=true;
          }
        }
        return;
      }
      const radius=state.player.vision;
      for(let y=state.player.y-radius;y<=state.player.y+radius;y++){
        for(let x=state.player.x-radius;x<=state.player.x+radius;x++){
          if(x<0||y<0||x>=WIDTH||y>=HEIGHT) continue;
          if(Math.abs(x-state.player.x)+Math.abs(y-state.player.y)<=radius+2){
            state.visibleNow[y][x]=true;
            state.seen[y][x]=true;
          }
        }
      }
    }

    // ===== Render / UI =====
    function render(){
      state.score=calcScore(); updateSeen();
      const cells=[];
      for(let y=0;y<HEIGHT;y++){
        for(let x=0;x<WIDTH;x++){
          const visibleNow = state.visibleNow[y][x];
          const seen = state.seen[y][x];
          if(!visibleNow && !seen){ cells.push(`<div class="cell"> </div>`); continue; }
          let ch = state.map[y][x]===TILE_WALL ? SPRITES.wall : SPRITES.floor;
          if(visibleNow){
            if(state.ladder.x===x&&state.ladder.y===y) ch=SPRITES.ladder;
            const it=itemAt(x,y); if(it) ch=it.char;
            const chest=chestAt(x,y); if(chest) ch=chest.char;
            const asahiyama=asahiyamaAt(x,y); if(asahiyama) ch=asahiyama.char;
            const en=enemyAt(x,y); if(en) ch=en.char;
          }
          if(state.player.x===x&&state.player.y===y) ch=SPRITES.player;
          cells.push(`<div class="cell">${ch}</div>`);
        }
      }
      mapEl.innerHTML=cells.join(""); if(!mapEl.contains(projectileLayer)) mapEl.appendChild(projectileLayer);
      const status = state.player.poison ? "☠️POISON" : "";
      const monsterAlert = state.floorEventType === "monsterHouse" ? "<span class=\"monster-alert\">❗️❗️❗️モンスターハウス❗️❗️❗️</span>" : "";
      const atkText = formatBuffStat("ATK", state.player.baseAtk, playerAtkValue(), "🪓");
      const defText = formatBuffStat("DEF", state.player.baseDef, playerDefValue(), "💎");
      statusEl.innerHTML = `
        <div class="row">${gaugeHtml("HP", state.player.hp, state.player.maxHp)} ${gaugeHtml("満腹度", state.player.hunger, state.player.hungerMax)}</div>
        <div class="row">階 ${state.floor} Lv ${state.player.level} EXP ${state.player.exp}/${expToNextLevel()} 視界 ${state.player.vision}/${state.player.visionMax} ${atkText} ${defText} SCORE ${state.score} BEST ${state.bestScore} ${status} ${monsterAlert}</div>
        <div class="row">イボ(${state.player.ibo}/${state.player.iboMax}) ITEM ${invToString()}</div>`;
    }

    // ===== Inventory =====
    function firstEmptySlot(){ return state.inventory.findIndex((s)=>s===null); }
    function addToInventory(item){
      const idx=firstEmptySlot();
      if(idx===-1) return false;
      state.inventory[idx]=createItem(item.key);
      return true;
    }
    function grantStarterItem(){
      const type = resolveDropType(STARTER_DROP_RULE);
      if(!type) return null;
      addToInventory(createItem(type));
      return type;
    }

    // ===== Battle / damage =====
    function applyDamage(target, amount, name="", shouldLog=true){ target.hp -= amount; if(shouldLog && name) addLog(`${name}に${amount}ダメージ！`); }

    function playerHungerCritBonus(){
      const hungerRatio = state.player.hunger / state.player.hungerMax;
      if(hungerRatio >= 0.75) return 0.02;
      if(hungerRatio >= 0.5) return 0;
      if(hungerRatio >= 0.25) return -0.01;
      return -0.02;
    }

    function resolveAttackDamage(atk, def, isEnemyAttack, critMultiplier=1, attackerName="", targetName=""){
      const normal = calcDamage(atk, def);
      let damage = normal;
      let isCritical = false;
      const baseCritChance = isEnemyAttack ? 0.07 : (state.player.floorAtkBuff > 0 ? 0.12 : 0.07) + playerHungerCritBonus();
      const critChance = clamp01(baseCritChance * critMultiplier);
      if(Math.random() < critChance){
        isCritical = true;
        damage = Math.ceil(normal * 2.5);
        const from = attackerName || "こうげき";
        const to = targetName || "あいて";
        addLog(`💥<span style="color:#ffd6d6;font-weight:800;background:#7a0010;padding:0 4px;">【きゅうしょ！】${from}→${to}に ${damage}ダメージ！！</span>💥`);
      }
      if(isEnemyAttack && Math.random() < 0.5) damage += 1;
      return { damage, isCritical };
    }

    function activateMimic(enemy){
      const enemyKey = enemy.key;
      if(enemyKey === "mimic" && !enemy.active) enemy.active = true;
    }

    function playerAttack(enemy){
      const { damage, isCritical } = resolveAttackDamage(playerAtkValue(), enemy.def, false, 1, "プレイヤー", enemy.char);
      activateMimic(enemy);
      applyDamage(enemy, damage, enemy.char, !isCritical);
      if(enemy.hp<=0) killEnemy(enemy);
    }

    function maybeLevelUp(){
      while(state.player.exp >= expToNextLevel()){
        state.player.exp -= expToNextLevel();
        state.player.level += 1;
        let atkUp = randInt(0,1);
        let defUp = randInt(0,1);
        const hpUp = randInt(2,3);
        if(atkUp + defUp === 0){
          if(Math.random() < 0.5) atkUp = 1;
          else defUp = 1;
        }
        const iboRateUp = randInt(1,2);
        state.player.baseAtk += atkUp;
        state.player.baseDef += defUp;
        state.player.maxHp += hpUp;
        state.player.hp = state.player.maxHp;
        state.player.iboChanceDenom = Math.max(
          state.player.iboChanceDenomMin,
          state.player.iboChanceDenom - iboRateUp
        );
        addLog(`レベルアップ！ ATK+${atkUp} DEF+${defUp} MAXHP+${hpUp} イボ率 1/${state.player.iboChanceDenom}`);
      }
    }

    function dropItemFromRule(x,y,rule){
      if(itemAt(x,y)) return;
      const type = resolveDropType(rule);
      if(!type) return;
      if(placeItemAt(type,x,y)) addLog(`${spriteForItemKey(type)}が落ちた。`);
    }
    function dropItemFromTable(x,y,dropTable){
      dropItemFromRule(x,y,{mode:DROP_MODE.POOL, pool:dropTable});
    }
    function dropItem(x,y,type){
      if(type){
        if(itemAt(x,y)) return;
        if(placeItemAt(type,x,y)) addLog(`${spriteForItemKey(type)}が落ちた。`);
        return;
      }
      dropItemFromRule(x,y,ENEMY_DEFAULT_DROP_RULE);
    }
    function removeRandomFoodItem(){
      const foodTypes = ["food","sushi","meat","feast"];
      const indexes = [];
      for(let i=0;i<state.inventory.length;i++) if(state.inventory[i] && foodTypes.includes(state.inventory[i].key)) indexes.push(i);
      if(!indexes.length) return false;
      const lostIndex = indexes[randInt(0,indexes.length-1)];
      state.inventory[lostIndex] = null;
      return true;
    }

    function killEnemy(enemy){
      state.enemies = state.enemies.filter((e)=>e!==enemy);
      const def = enemyDefFromInstance(enemy);
      const enemyKey = def?.key || enemy.key;
      if(enemyKey === "chick") addLog("🐥「たくましい子…」");
      else addLog(`${enemy.char}をたおした！`);
      if(state.kills[enemyKey]!==undefined) state.kills[enemyKey] += 1;
      state.player.exp += enemy.exp;
      const dropRule = enemy.dropRule || enemyDropRule(def || enemyKey);
      if(enemyKey === "mimic"){
        const type = resolveDropType(dropRule);
        if(type){
          const item = createItem(type);
          const itemDef = itemDefByKey(item.key);
          const pickupMode = itemDef?.pickupMode || ITEM_PICKUP_MODE.INVENTORY;
          const effect = itemDef ? ITEM_EFFECTS[itemDef.effectKey] : null;
          if(pickupMode === ITEM_PICKUP_MODE.INSTANT){
            if(effect) effect(item, -1, {source:"pickup"});
          }else if(addToInventory(item)) addLog(`${item.char}を手に入れた。(${invToString()})`);
          else if(placeItemAt(type, enemy.x, enemy.y)) addLog(`持ち物がいっぱいだ。${item.char}が落ちた。`);
        }
      }else{
        dropItemFromRule(enemy.x, enemy.y, dropRule);
      }
      maybeLevelUp();
    }

    function buildDeathMessage(causeInfo={cause:"generic"}){
      if(state.player.poison) return "あなたは毒に侵されて死んだ…。 Rで再開";
      if(causeInfo.cause === "enemy" && causeInfo.enemyChar) return `あなたは、${causeInfo.enemyChar}にトドメをさされ、力尽きた…。 Rで再開`;
      if(causeInfo.cause === "hunger") return "あなたは飢え、豪華な食事のまぼろしを見ながら倒れた…。 Rで再開";
      return "あなたは力尽きた…。 Rで再開";
    }

    function endAsGameOver(causeInfo={cause:"generic"}){ state.player.hp=Math.max(0,state.player.hp); state.gameOver=true; addLog(buildDeathMessage(causeInfo)); finalizeScore("GAME OVER"); }

    function enemyAttack(enemy){
      const enemyKey = enemy.key;
      if(enemyKey === "rain"){
        const roll = Math.random();
        if(roll < 0.06){
          state.player.vision = Math.max(state.player.visionMin, state.player.vision - 1);
          addLog("暗い雲につつまれた。");
        }
        else if(roll < 0.12){
          if(removeRandomFoodItem()) addLog("食料が豪雨に流された。");
        }
        else {
          state.player.hunger = Math.max(0, state.player.hunger - randInt(1, 2));
          updateHungerWarning();
          addLog("疲れた身体に降り注ぐ雨が、とても苛立つ。");
        }
        if(state.player.hp<=0) endAsGameOver({cause:"generic"});
        return;
      }

      const { damage, isCritical } = resolveAttackDamage(enemy.atk, playerDefValue(), true, enemyKey === "mimic" ? 2 : 1, enemy.char, "プレイヤー");
      applyDamage(state.player, damage, "プレイヤー", !isCritical);

      if(enemyKey === "lion" && state.player.hp > 0 && Math.random() < 0.15){
        const { damage: extraDamage } = resolveAttackDamage(enemy.atk, playerDefValue(), true, 1, enemy.char, "プレイヤー");
        state.player.hp -= extraDamage;
        addLog(`すばやい追撃をうけた！${extraDamage}ダメージ！！`);
      }

      if(enemyKey === "mimic" && state.player.hp>0 && Math.random()<0.05){
        state.player.baseAtk = Math.max(1, state.player.baseAtk - 1);
        addLog("攻撃力が下がった…");
      }

      if(enemyKey === "skull"){
        const before=state.player.exp; state.player.exp=Math.max(0,state.player.exp-damage); addLog(`${enemy.char}の呪い！ EXP-${before-state.player.exp}`);
        if(!state.player.diamondWard && Math.random()<0.2){ state.player.maxHp=Math.max(1,state.player.maxHp-1); if(state.player.hp>state.player.maxHp) state.player.hp=state.player.maxHp; addLog("最大HPが1減った…"); }
      }

      if(enemyKey === "ghost" && state.player.hp > 0 && Math.random() < 0.30){
        // 満腹を98%に（切り上げ）
        const beforeHunger = state.player.hunger;
        state.player.hunger = Math.ceil(state.player.hunger * 0.98);
        updateHungerWarning();

        // HPを1〜2減らす
        const extraHp = randInt(1, 2);
        state.player.hp -= extraHp;

        addLog(`${enemy.char}の冷気！ 満腹${beforeHunger}→${state.player.hunger} & 追加${extraHp}ダメージ！`);
      }
      if(enemyKey === "dragon" && state.player.hp>0 && Math.random()<0.5){
        const flame = Math.max(1, Math.ceil(state.player.hp * 0.12) - Math.floor(playerDefValue() / 3));
        state.player.hp -= flame;
        addLog(`${enemy.char}の炎！ 追加${flame}ダメージ！`);
      }
      if(enemyKey === "zombie" && state.player.hp>0 && !state.player.diamondWard){ const corrosion = Math.max(0, Math.min(damage * 3, 10) - randInt(0,3)); if(corrosion>0){ state.player.hungerMax=Math.max(1,state.player.hungerMax-corrosion); if(state.player.hunger>state.player.hungerMax) state.player.hunger=state.player.hungerMax; updateHungerWarning(); addLog(`${enemy.char}の腐食！ 最大満腹-${corrosion}`);} }
      if(enemyKey === "invader" && state.player.hp>0 && !state.player.diamondWard && Math.random()<0.1){ state.player.baseDef=Math.max(1,state.player.baseDef-1); addLog("防御力が下がった…"); }
      if(enemyKey === "spider" && state.player.hp>0 && !state.player.diamondWard && Math.random()<0.2){ state.player.poison=true; addLog("毒を受けた！"); }

      if(state.player.hp<=0) endAsGameOver({cause:"enemy", enemyChar:enemy.char});
    }

    async function pickupItem(){
      const it = itemAt(state.player.x,state.player.y); if(!it) return;
      const def = itemDefByKey(it.key);
      const pickupMode = def?.pickupMode || ITEM_PICKUP_MODE.INVENTORY;
      const effect = def ? ITEM_EFFECTS[def.effectKey] : null;

      if(pickupMode === ITEM_PICKUP_MODE.INSTANT){
        state.items = state.items.filter((i)=>i!==it);
        if(effect) await effect(it, -1, {source:"pickup"});
        return;
      }

      if(!addToInventory(it)){ addLog("持ち物がいっぱいだ。"); return; }
      state.items = state.items.filter((i)=>i!==it);
      if(it.key === "poop" || it.char === "💩"){
        addLog("💩を拾った。");
        addLog("…これは、『かりんとう』というお菓子だ…");
      }else{
        addLog(`${it.char}を拾った。(${invToString()})`);
      }
    }

function openChest(){
  const chest = chestAt(state.player.x, state.player.y);
  if(!chest) return;

  const type = resolveDropType(CHEST_DROP_RULE);
  if(!type) return;
  const item = createItem(type);
  const def = itemDefByKey(item.key);
  const pickupMode = def?.pickupMode || ITEM_PICKUP_MODE.INVENTORY;
  const effect = def ? ITEM_EFFECTS[def.effectKey] : null;

  state.chests = state.chests.filter((c)=>c!==chest);
  addLog("🎁宝箱を開けた！");

  if(pickupMode === ITEM_PICKUP_MODE.INSTANT){
    if(effect) effect(item, -1, {source:"pickup"});
    return;
  }

  if(addToInventory(item)){
    addLog(`${item.char}を手に入れた。(${invToString()})`);
    return;
  }

  if(placeItemAt(item.key, state.player.x, state.player.y)) addLog(`持ち物がいっぱいだ。${item.char}が落ちた。`);
}

    // ===== Items =====
    const ITEM_EFFECTS = {
      food: async ()=>{ state.player.hunger=Math.min(state.player.hungerMax,state.player.hunger+50); updateHungerWarning(); addLog("🍙を食べた！ 満腹+50"); return {consumed:true,endTurn:true}; },
      meat: async ()=>{ state.player.hunger=Math.min(state.player.hungerMax,state.player.hunger+100); updateHungerWarning(); addLog("🥩を食べた！ 満腹+100"); return {consumed:true,endTurn:true}; },
      sushi: async ()=>{
        state.player.hunger=Math.min(state.player.hungerMax,state.player.hunger+120);
        updateHungerWarning();
        const healHp=Math.ceil((state.player.maxHp-state.player.hp)/3);
        state.player.hp=Math.min(state.player.maxHp,state.player.hp+healHp);
        addLog(`🍣を食べた！ 満腹+120 / HP+${healHp}`);
        return {consumed:true,endTurn:true};
      },
      feast: async ()=>{
        state.player.maxHp+=1;
        state.player.hungerMax+=25;
        state.player.hunger=Math.min(state.player.hungerMax,state.player.hunger+200);
        updateHungerWarning();
        const healHp=Math.ceil((state.player.maxHp-state.player.hp)/1.5);
        state.player.hp=Math.min(state.player.maxHp,state.player.hp+healHp);
        addLog(`🍖を食べた！ 最大HP+1 & 最大満腹+25 & 満腹+200 / HP+${healHp}`);
        return {consumed:true,endTurn:true};
      },
      potion: async ()=>{
        const heal = Math.ceil(state.player.maxHp * 0.1 + 10 + randInt(-2,2));
        state.player.hp=Math.min(state.player.maxHp,state.player.hp+heal);
        addLog(`🧪を使った！ HP+${heal}`);
        if(state.player.poison){ state.player.poison=false; addLog("解毒した。"); }
        return {consumed:true,endTurn:true};
      },
      map: async ()=>{ state.revealed=true; addLog("👁 地図を見通した！"); return {consumed:true,endTurn:true}; },
      sun: async (_item, _slotIndex, ctx={})=>{ state.player.vision = Math.min(state.player.visionMax, state.player.vision + 1); if(ctx.source==="pickup") instantPickupLog("🌤️", "視界+1"); else addLog("🌤️を使った！ 視界+1"); return {consumed:true,endTurn:true}; },
      shield: async (_item, _slotIndex, ctx={})=>{ state.player.baseDef+=1; if(ctx.source==="pickup") instantPickupLog("🛡️", "DEF+1"); else addLog("🛡️を装備した！ DEF+1（恒久）"); return {consumed:true,endTurn:true}; },
      axe: async ()=>{ applyFloorAtkBuffFromFinal(Math.ceil(playerAtkValue()*1.1+1)); addLog("🪓を装備した！ ATK強化（このフロアのみ）"); return {consumed:true,endTurn:true}; },
      diamond: async ()=>{ applyFloorDefBuffFromFinal(Math.ceil(playerDefValue()*1.1+1)); state.player.diamondWard=true; addLog("💎を装備した！ DEF強化（このフロアのみ）"); return {consumed:true,endTurn:true}; },
      dagger: async (_item, _slotIndex, ctx={})=>{ state.player.baseAtk+=1; if(ctx.source==="pickup") instantPickupLog("🗡️", "ATK+1"); else addLog("🗡️を装備した！ ATK+1（恒久）"); return {consumed:true,endTurn:true}; },
      star: async (_item, slotIndex)=>{ state.inventory[slotIndex]=null; await starBurst(); return {consumed:false,endTurn:false}; },
      poop: async ()=>{ const didFire = await poopShot(); return {consumed:didFire,endTurn:didFire}; },
      bean: async (_item, _slotIndex, ctx={})=>{
        if(state.player.iboMax>=state.player.iboMaxCap){
          if(ctx.source==="pickup") instantPickupLog("🫘", "これ以上イボは増やせない");
          else addLog("🫘これ以上イボは増やせない");
          return {consumed:true,endTurn:true};
        }
        state.player.iboMax++;
        if(ctx.source==="pickup") instantPickupLog("🫘", "イボ最大値+1");
        else addLog("🫘イボ最大値+1");
        return {consumed:true,endTurn:true};
      }
    };

    async function useInventory(slotIndex){
      if(state.gameOver||state.inputLocked||slotIndex<0||slotIndex>=state.invSize) return;
      const slot = state.inventory[slotIndex]; if(!slot){ addLog(`スロット${slotIndex+1}は空だ。`); return; }
      const def = itemDefByKey(slot.key);
      const effect = def ? ITEM_EFFECTS[def.effectKey] : null;
      if(!effect){ addLog(`${slot.char}は使えない。`); return; }
      const result = await effect(slot, slotIndex, {source:"inventory"});
      if(!result?.consumed) return;
      state.inventory[slotIndex]=null; endTurn();
    }

    function walkRegen(){ state.player.walkCount+=1; if(state.player.walkCount%20!==0||state.starving||state.player.hp>=state.player.maxHp) return; state.player.hp=Math.min(state.player.maxHp,state.player.hp+1); addLog("歩いて体勢を立て直した。HP+1"); }

    // ===== Player action / turn =====
    async function movePlayer(dx,dy){
      if(state.gameOver||state.inputLocked) return;
      const nx=state.player.x+dx, ny=state.player.y+dy;
      if(!isWalkable(nx,ny)) return endTurn();
      const foe = enemyAt(nx,ny); if(foe){ playerAttack(foe); return endTurn(); }
      state.player.x=nx; state.player.y=ny; walkRegen();
      const asahiyama = asahiyamaAt(nx,ny);
      if(asahiyama) triggerAsahiyama(asahiyama);
      await pickupItem(); openChest();
      if(nx===state.ladder.x&&ny===state.ladder.y){ state.floor+=1; addLog("🪜 次の階へ進む！"); setupFloor(); return; }
      endTurn();
    }

    function waitTurn(){ if(state.gameOver||state.inputLocked) return; addLog("その場で待機した。"); endTurn(); }
    function eatIbo(){ if(state.gameOver||state.inputLocked) return; if(state.player.ibo<1){ addLog("イボがない！"); return; } state.player.ibo-=1; state.player.hunger=Math.min(state.player.hungerMax,state.player.hunger+60); updateHungerWarning(); addLog("イボをたべた！ 満腹+60"); endTurn(); }
    const sleep = (ms)=>new Promise((resolve)=>setTimeout(resolve,ms));
    function setProjectilePos(el,x,y){ el.style.left=`${GRID_PADDING + x*CELL_SIZE}px`; el.style.top=`${GRID_PADDING + y*CELL_SIZE}px`; }

    async function iboBeam(){
      if(state.gameOver||state.inputLocked) return;
      if(state.player.ibo<1){ addLog("イボがない！"); return; }
      state.inputLocked=true; state.player.ibo-=1; addLog("いぼビーム！");
      const dirs=[[0,-1],[0,1],[-1,0],[1,0]]; const hitSet=new Set();
      const bullets=dirs.map(([dx,dy])=>{ const el=document.createElement("div"); el.className="projectile"; el.textContent=SPRITES.orb; setProjectilePos(el,state.player.x,state.player.y); projectileLayer.appendChild(el); return {x:state.player.x,y:state.player.y,dx,dy,el,active:true}; });
      try{
        while(bullets.some((b)=>b.active)){
          for(const b of bullets){
            if(!b.active) continue;
            const nx=b.x+b.dx, ny=b.y+b.dy;
            if(!isWalkable(nx,ny)){ b.active=false; b.el.remove(); continue; }
            b.x=nx; b.y=ny; setProjectilePos(b.el,b.x,b.y);
            const en=enemyAt(b.x,b.y);
            if(en&&!hitSet.has(en)){
              hitSet.add(en);
              const base = calcDamage(playerAtkValue(), en.def);
              const multiplier = randInt(150,200) / 100;
              const damage = Math.round(base * multiplier);
              activateMimic(en);
              applyDamage(en, damage, en.char);
            }
          }
          render(); await sleep(PROJECTILE_STEP_MS);
        }
        for(const en of [...state.enemies]) if(en.hp<=0) killEnemy(en);
        endTurn();
      } finally { for(const b of bullets) b.el.remove(); state.inputLocked=false; }
    }

    async function starBurst(){
      if(state.gameOver||state.inputLocked) return;
      state.inputLocked=true; addLog("🌟が弾けた！");
      const dirs=[[0,-1],[0,1],[-1,0],[1,0]]; const hitSet=new Set();
      const bullets=dirs.map(([dx,dy])=>{ const el=document.createElement("div"); el.className="projectile"; el.textContent=SPRITES.starBeam; setProjectilePos(el,state.player.x,state.player.y); projectileLayer.appendChild(el); return {x:state.player.x,y:state.player.y,dx,dy,el,active:true}; });
      try{
        while(bullets.some((b)=>b.active)){
          for(const b of bullets){
            if(!b.active) continue;
            const nx=b.x+b.dx, ny=b.y+b.dy;
            if(nx<0||nx>=WIDTH||ny<0||ny>=HEIGHT){ b.active=false; b.el.remove(); continue; }
            b.x=nx; b.y=ny; setProjectilePos(b.el,b.x,b.y);
            const en=enemyAt(b.x,b.y);
            if(en&&!hitSet.has(en)){
              hitSet.add(en);
              const beamBase = calcDamage(playerAtkValue(), en.def);
              activateMimic(en);
              applyDamage(en, beamBase*4, en.char);
            }
          }
          render(); await sleep(PROJECTILE_STEP_MS);
        }
        for(const en of [...state.enemies]) if(en.hp<=0) killEnemy(en);
        endTurn();
      } finally { for(const b of bullets) b.el.remove(); state.inputLocked=false; }
    }


    async function poopShot(){
      if(state.gameOver||state.inputLocked) return false;
      const dirs=[[0,-1],[0,1],[-1,0],[1,0]].filter(([dx,dy])=>isWalkable(state.player.x+dx,state.player.y+dy));
      if(!dirs.length){
        addLog("💩を投げられない！");
        return false;
      }
      const [dx,dy]=dirs[randInt(0,dirs.length-1)];
      state.inputLocked=true;
      addLog("💩  くそまほう！　💩　茶色い疾風が勢いよく飛び出す！！");
      const el=document.createElement("div");
      el.className="projectile";
      el.textContent=SPRITES.poop;
      let x=state.player.x,y=state.player.y;
      setProjectilePos(el,x,y);
      projectileLayer.appendChild(el);
      try{
        while(true){
          const nx=x+dx, ny=y+dy;
          if(!isWalkable(nx,ny)){
            dropItem(x,y,"poop");
            addLog("💩が壁に当たって落ちた。");
            break;
          }
          x=nx; y=ny;
          setProjectilePos(el,x,y);
          const en=enemyAt(x,y);
          if(en){
            const damage = calcDamage(playerAtkValue()*5, en.def);
            activateMimic(en);
            applyDamage(en, damage, en.char);
            addLog(`💩が突きささる！ ${damage}ダメージ！`);
            if(en.hp<=0) killEnemy(en);
            break;
          }
          render();
          await sleep(PROJECTILE_STEP_MS);
        }
        render();
      } finally {
        el.remove();
        state.inputLocked=false;
      }
      return true;
    }

    // ===== Enemy pathfinding =====
    const canSeePlayer = (ex,ey)=>Math.abs(ex-state.player.x)+Math.abs(ey-state.player.y)<=12;

    function bfsStep(startX,startY,goalX,goalY){
      const q=[{x:startX,y:startY}], came=new Map(), key=(x,y)=>`${x},${y}`; came.set(key(startX,startY), null);
      while(q.length){
        const cur=q.shift(); if(cur.x===goalX&&cur.y===goalY) break;
        for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
          const nx=cur.x+dx, ny=cur.y+dy, k=key(nx,ny);
          if(!isWalkable(nx,ny)||came.has(k)) continue;
          if(enemyAt(nx,ny)&&!(nx===goalX&&ny===goalY)) continue;
          came.set(k,cur); q.push({x:nx,y:ny});
        }
      }
      if(!came.has(key(goalX,goalY))) return null;
      let node={x:goalX,y:goalY}, prev=came.get(key(node.x,node.y));
      while(prev&&!(prev.x===startX&&prev.y===startY)){ node=prev; prev=came.get(key(node.x,node.y)); }
      return node;
    }

    // ===== Enemy AI =====
    function enemyTurn(){
      for(const en of state.enemies){
        const enemyKey = en.key;
        if(enemyKey === "mimic" && !en.active) continue;
        if(Math.abs(en.x-state.player.x)+Math.abs(en.y-state.player.y)===1){
          if(enemyKey === "chick"){
            const lines = [
              "🐥「ぎゃあああ！…『思いやり』は無いの！？」",
              "🐥「もしかして、僕を攻撃することで『進んで学習』をしてる？」"
            ];
            addLog(lines[Math.floor(Math.random()*lines.length)]);
            continue;
          }
          enemyAttack(en);
          if(state.gameOver) return;
          continue;
        }
        let moved=false;
        if(canSeePlayer(en.x,en.y)){
          const step=bfsStep(en.x,en.y,state.player.x,state.player.y);
          if(step&&!(step.x===state.player.x&&step.y===state.player.y)&&!enemyAt(step.x,step.y)){ en.x=step.x; en.y=step.y; moved=true; }
        }
        if(!moved){
          for(const [dx,dy] of shuffle([[1,0],[-1,0],[0,1],[0,-1]])){
            const nx=en.x+dx, ny=en.y+dy;
            if(!isWalkable(nx,ny)||enemyAt(nx,ny)||(nx===state.player.x&&ny===state.player.y)) continue;
            en.x=nx; en.y=ny; break;
          }
        }
      }
    }

    function hungerTurn(){
      const extra = Math.random() < Math.min(0.2, Math.max(0,state.floor-5)*0.02) ? 1 : 0;
      let consume = 1 + extra;
      if(state.player.poison) consume *= 2;
      state.player.hunger = Math.max(0, state.player.hunger - consume);
      updateHungerWarning();
      state.starving = state.player.hunger === 0;
      if(state.starving){
        state.player.hp -= 1; addLog("大ピンチ！ 空腹ダメージ1");
        if(state.player.hp<=0) endAsGameOver({cause:"hunger"});
      }
    }

    function iboTurn(){
      if(state.iboCooldown>0) state.iboCooldown -= 1;
      if(state.player.hunger<=0||state.player.ibo>=state.player.iboMax||state.iboCooldown!==0) return;
      if(Math.random()<1/state.player.iboChanceDenom){ state.player.ibo += 1; state.iboCooldown = 10; addLog("【イボがはえた！】"); }
    }

    function endTurn(){ state.turns+=1; enemyTurn(); if(state.gameOver) return render(); hungerTurn(); if(state.gameOver) return render(); iboTurn(); render(); }

    function initializeRunState(){
      state.floor = 1;
      state.player = createInitialPlayer();
      state.inventory = [...EMPTY_INVENTORY];
      state.score = 0;
      state.turns = 0;
      state.logs = [];
      state.gameOver = false;
      state.starving = false;
      state.hungerLowNotified = false;
      state.asahiyama = null;
      state.floorEventType = "normal";
      state.seen = [];
      state.visibleNow = [];
      state.kills = buildEmptyKillMap();
    }

    function restartGame(){
      initializeRunState();
      const starterItemType = grantStarterItem();
      addLog(`ぼじろーぐ開始！ 初期アイテム: ${spriteForItemKey(starterItemType)}`); setupFloor();
    }

    window.addEventListener("keydown", (e)=>{
      const key=e.key;
      if(key === "Delete"){
        e.preventDefault();
        resetBestScore();
        return;
      }
      if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," ","a","A","b","B","r","R","1","2","3","4","5"].includes(key)) e.preventDefault();
      if(key==="r"||key==="R") return restartGame();
      if(state.gameOver||state.inputLocked) return;
      if(key==="ArrowUp") movePlayer(0,-1);
      else if(key==="ArrowDown") movePlayer(0,1);
      else if(key==="ArrowLeft") movePlayer(-1,0);
      else if(key==="ArrowRight") movePlayer(1,0);
      else if(key===" ") waitTurn();
      else if(key==="a"||key==="A") iboBeam();
      else if(key==="b"||key==="B") eatIbo();
      else if(key==="1") useInventory(0);
      else if(key==="2") useInventory(1);
      else if(key==="3") useInventory(2);
      else if(key==="4") useInventory(3);
      else if(key==="5") useInventory(4);
    });

    restartGame();
  </script>
