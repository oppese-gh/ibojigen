<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぼじろーぐ</title>
  <style>
    :root {
      --bg: #111;
      --panel: #1b1b1b;
      --text: #f2f2f2;
      --accent: #7ad1ff;
      --wall: #7f8c8d;
      --floor: #2c3e50;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Noto Sans Mono CJK JP", monospace;
      padding: 12px;
    }
    .wrap {
      width: min(100%, 980px);
      background: var(--panel);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 20px;
    }
    #map {
      margin: 0;
      line-height: 1;
      font-size: 20px;
      letter-spacing: 0;
      white-space: pre;
      background: #0d0d0d;
      border: 1px solid #444;
      padding: 8px;
      overflow: auto;
      user-select: none;
      min-height: calc(25 * 1em + 16px);
    }
    #status {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #3b3b3b;
      background: #141414;
      font-size: 16px;
      line-height: 1.5;
    }
    #log {
      margin-top: 8px;
      border: 1px solid #3b3b3b;
      background: #101010;
      min-height: 96px;
      max-height: 160px;
      overflow-y: auto;
      padding: 8px;
      font-size: 14px;
      line-height: 1.35;
    }
    #help {
      margin-top: 8px;
      color: #ccc;
      font-size: 13px;
    }
    .line { margin-bottom: 3px; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>ぼじろーぐ</h1>
    <pre id="map" aria-label="game map"></pre>
    <div id="status"></div>
    <div id="log"></div>
    <div id="help">操作: ↑↓←→移動 / Space 待機 / A いぼビーム / B イボをたべる</div>
  </main>

  <script>
    "use strict";

    const WIDTH = 40;
    const HEIGHT = 25;
    const MAX_LOG = 8;

    const TILE_WALL = "#";
    const TILE_FLOOR = ".";

    const SPRITES = {
      player: "🧔",
      dog: "🐕",
      guard: "👮",
      food: "🍖",
      potion: "🧪",
      map: "👁",
      ladder: "🪜",
      wall: "#",
      floor: "."
    };

    const mapEl = document.getElementById("map");
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");

    const state = {
      floor: 1,
      map: [],
      rooms: [],
      player: {
        x: 1,
        y: 1,
        hp: 20,
        maxHp: 20,
        atk: 3,
        def: 1,
        hunger: 1000,
        ibo: 0,
        iboMax: 5,
        exp: 0,
        level: 1
      },
      enemies: [],
      items: [],
      ladder: { x: 0, y: 0 },
      logs: [],
      revealed: false,
      seen: [],
      iboCooldown: 0,
      gameOver: false,
      cleared: false,
      starving: false
    };

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function addLog(message) {
      state.logs.unshift(message);
      if (state.logs.length > MAX_LOG) state.logs.pop();
      logEl.innerHTML = state.logs.map((m) => `<div class="line">${m}</div>`).join("");
    }

    function createMap() {
      const map = Array.from({ length: HEIGHT }, () => Array(WIDTH).fill(TILE_WALL));
      const rooms = [];
      const roomCount = randInt(6, 10);
      let attempts = 0;
      while (rooms.length < roomCount && attempts < 120) {
        attempts++;
        const w = randInt(4, 8);
        const h = randInt(3, 6);
        const x = randInt(1, WIDTH - w - 2);
        const y = randInt(1, HEIGHT - h - 2);
        const room = { x, y, w, h, cx: x + Math.floor(w / 2), cy: y + Math.floor(h / 2) };

        const overlap = rooms.some((r) => {
          return x - 1 <= r.x + r.w && x + w + 1 >= r.x && y - 1 <= r.y + r.h && y + h + 1 >= r.y;
        });
        if (overlap) continue;

        for (let yy = y; yy < y + h; yy++) {
          for (let xx = x; xx < x + w; xx++) map[yy][xx] = TILE_FLOOR;
        }

        if (rooms.length > 0) {
          const prev = rooms[rooms.length - 1];
          carveCorridor(map, prev.cx, prev.cy, room.cx, room.cy);
        }
        rooms.push(room);
      }
      return { map, rooms };
    }

    function carveCorridor(map, x1, y1, x2, y2) {
      let x = x1;
      let y = y1;
      if (Math.random() < 0.5) {
        while (x !== x2) {
          map[y][x] = TILE_FLOOR;
          x += x < x2 ? 1 : -1;
        }
        while (y !== y2) {
          map[y][x] = TILE_FLOOR;
          y += y < y2 ? 1 : -1;
        }
      } else {
        while (y !== y2) {
          map[y][x] = TILE_FLOOR;
          y += y < y2 ? 1 : -1;
        }
        while (x !== x2) {
          map[y][x] = TILE_FLOOR;
          x += x < x2 ? 1 : -1;
        }
      }
      map[y2][x2] = TILE_FLOOR;
    }

    function setupFloor() {
      const built = createMap();
      state.map = built.map;
      state.rooms = built.rooms;
      state.items = [];
      state.enemies = [];
      state.revealed = false;
      state.seen = Array.from({ length: HEIGHT }, () => Array(WIDTH).fill(false));
      state.iboCooldown = 0;

      const startRoom = state.rooms[0];
      state.player.x = startRoom.cx;
      state.player.y = startRoom.cy;

      let far = state.rooms[0];
      let best = -1;
      for (const r of state.rooms) {
        const d = Math.abs(r.cx - startRoom.cx) + Math.abs(r.cy - startRoom.cy);
        if (d > best) {
          best = d;
          far = r;
        }
      }
      state.ladder = { x: far.cx, y: far.cy };

      placeEnemies();
      placeItems();
      addLog(`第${state.floor}階に降りた。`);
      render();
    }

    function isWalkable(x, y) {
      return x >= 0 && x < WIDTH && y >= 0 && y < HEIGHT && state.map[y][x] === TILE_FLOOR;
    }

    function enemyAt(x, y) {
      return state.enemies.find((e) => e.x === x && e.y === y);
    }

    function itemAt(x, y) {
      return state.items.find((it) => it.x === x && it.y === y);
    }

    function positionFree(x, y) {
      if (!isWalkable(x, y)) return false;
      if (state.player.x === x && state.player.y === y) return false;
      if (enemyAt(x, y)) return false;
      if (itemAt(x, y)) return false;
      if (state.ladder.x === x && state.ladder.y === y) return false;
      return true;
    }

    function randomFloorPos() {
      const cells = [];
      for (let y = 1; y < HEIGHT - 1; y++) {
        for (let x = 1; x < WIDTH - 1; x++) {
          if (state.map[y][x] === TILE_FLOOR) cells.push({ x, y });
        }
      }
      shuffle(cells);
      return cells;
    }

    function placeEnemies() {
      const pool = randomFloorPos();
      const count = randInt(2, 3) + Math.floor((state.floor - 1) * 0.9);
      let placed = 0;
      for (const p of pool) {
        if (placed >= count) break;
        if (Math.abs(p.x - state.player.x) + Math.abs(p.y - state.player.y) < 4) continue;
        if (p.x === state.ladder.x && p.y === state.ladder.y) continue;

        const isGuard = Math.random() < 0.42;
        state.enemies.push(
          isGuard
            ? { x: p.x, y: p.y, type: "guard", hp: 10, atk: 3, def: 1, char: SPRITES.guard }
            : { x: p.x, y: p.y, type: "dog", hp: 6, atk: 2, def: 0, char: SPRITES.dog }
        );
        placed++;
      }
    }

    function placeItems() {
      const pool = randomFloorPos();
      const itemCount = randInt(2, 4);
      let placed = 0;
      for (const p of pool) {
        if (placed >= itemCount) break;
        if (!positionFree(p.x, p.y)) continue;
        const roll = Math.random();
        const type = roll < 0.4 ? "food" : roll < 0.8 ? "potion" : "map";
        const char = type === "food" ? SPRITES.food : type === "potion" ? SPRITES.potion : SPRITES.map;
        state.items.push({ x: p.x, y: p.y, type, char });
        placed++;
      }
    }

    function render() {
      updateSeen();
      const rows = [];
      for (let y = 0; y < HEIGHT; y++) {
        let row = "";
        for (let x = 0; x < WIDTH; x++) {
          const visible = state.revealed || state.seen[y][x];
          if (!visible) {
            row += " ";
            continue;
          }
          let ch = state.map[y][x] === TILE_WALL ? SPRITES.wall : SPRITES.floor;

          if (state.ladder.x === x && state.ladder.y === y) ch = SPRITES.ladder;
          const it = itemAt(x, y);
          if (it) ch = it.char;
          const en = enemyAt(x, y);
          if (en) ch = en.char;
          if (state.player.x === x && state.player.y === y) ch = SPRITES.player;

          row += ch;
        }
        rows.push(row);
      }
      mapEl.textContent = rows.join("\n");

      statusEl.textContent = [
        `HP ${state.player.hp}/${state.player.maxHp}`,
        `空腹 ${state.player.hunger}${state.starving ? " (ピンチ)" : ""}`,
        `ATK ${state.player.atk} DEF ${state.player.def}`,
        `イボ ${state.player.ibo}/${state.player.iboMax}`,
        `階 ${state.floor}`
      ].join("\n");
    }

    function updateSeen() {
      if (state.revealed) {
        for (let y = 0; y < HEIGHT; y++) {
          for (let x = 0; x < WIDTH; x++) state.seen[y][x] = true;
        }
        return;
      }
      const radius = 8;
      for (let y = state.player.y - radius; y <= state.player.y + radius; y++) {
        for (let x = state.player.x - radius; x <= state.player.x + radius; x++) {
          if (x < 0 || y < 0 || x >= WIDTH || y >= HEIGHT) continue;
          if (Math.abs(x - state.player.x) + Math.abs(y - state.player.y) <= radius + 2) {
            state.seen[y][x] = true;
          }
        }
      }
    }

    function applyDamage(target, amount, name = "") {
      target.hp -= amount;
      if (name) addLog(`${name}に${amount}ダメージ！`);
    }

    function playerAttack(enemy) {
      const damage = Math.max(1, state.player.atk - enemy.def);
      applyDamage(enemy, damage, enemy.char);
      if (enemy.hp <= 0) {
        killEnemy(enemy);
      }
    }

    function killEnemy(enemy) {
      state.enemies = state.enemies.filter((e) => e !== enemy);
      addLog(`${enemy.char}をたおした！`);
      state.player.exp += 1;
      if (Math.random() < 0.2) {
        dropItem(enemy.x, enemy.y);
      }
      maybeLevelUp();
    }

    function dropItem(x, y) {
      if (itemAt(x, y)) return;
      const roll = Math.random();
      const type = roll < 0.5 ? "food" : roll < 0.85 ? "potion" : "map";
      const char = type === "food" ? SPRITES.food : type === "potion" ? SPRITES.potion : SPRITES.map;
      state.items.push({ x, y, type, char });
      addLog(`${char}が落ちた。`);
    }

    function maybeLevelUp() {
      const need = state.player.level * 3;
      if (state.player.exp >= need) {
        state.player.exp = 0;
        state.player.level++;
        state.player.atk += 1;
        state.player.maxHp += 2;
        state.player.hp = state.player.maxHp;
        addLog(`レベルアップ！ ATK+1 MAX_HP+2`);
      }
    }

    function enemyAttack(enemy) {
      const damage = Math.max(1, enemy.atk - state.player.def);
      applyDamage(state.player, damage, "プレイヤー");
      if (state.player.hp <= 0) {
        state.player.hp = 0;
        state.gameOver = true;
        addLog("あなたは力尽きた… Rで再開");
      }
    }

    function pickupItem() {
      const it = itemAt(state.player.x, state.player.y);
      if (!it) return;
      state.items = state.items.filter((i) => i !== it);
      if (it.type === "food") {
        state.player.hunger = Math.min(1000, state.player.hunger + 300);
        addLog("🍖を食べた！ 空腹+300");
      } else if (it.type === "potion") {
        state.player.hp = Math.min(state.player.maxHp, state.player.hp + 10);
        addLog("🧪を使った！ HP+10");
      } else {
        state.revealed = true;
        addLog("👁 地図を見通した！");
      }
    }

    function movePlayer(dx, dy) {
      if (state.gameOver) return;
      const nx = state.player.x + dx;
      const ny = state.player.y + dy;
      if (!isWalkable(nx, ny)) return endTurn();

      const foe = enemyAt(nx, ny);
      if (foe) {
        playerAttack(foe);
        return endTurn();
      }

      state.player.x = nx;
      state.player.y = ny;
      pickupItem();

      if (nx === state.ladder.x && ny === state.ladder.y) {
        state.floor += 1;
        addLog("🪜 次の階へ進む！");
        setupFloor();
        return;
      }
      endTurn();
    }

    function waitTurn() {
      if (state.gameOver) return;
      addLog("その場で待機した。");
      endTurn();
    }

    function eatIbo() {
      if (state.gameOver) return;
      if (state.player.ibo < 1) {
        addLog("イボがない！");
        return;
      }
      state.player.ibo -= 1;
      state.player.hunger = Math.min(1000, state.player.hunger + 60);
      addLog("イボをたべた！ 空腹+60");
      endTurn();
    }

    function iboBeam() {
      if (state.gameOver) return;
      if (state.player.ibo < 1) {
        addLog("イボがない！");
        return;
      }
      state.player.ibo -= 1;
      addLog("いぼビーム！");
      const dirs = [
        [0, -1],
        [0, 1],
        [-1, 0],
        [1, 0]
      ];
      const hitSet = new Set();
      for (const [dx, dy] of dirs) {
        let x = state.player.x + dx;
        let y = state.player.y + dy;
        while (isWalkable(x, y)) {
          const en = enemyAt(x, y);
          if (en && !hitSet.has(en)) {
            hitSet.add(en);
            const damage = Math.max(1, state.player.atk - en.def);
            applyDamage(en, damage, en.char);
          }
          x += dx;
          y += dy;
        }
      }
      for (const en of [...state.enemies]) {
        if (en.hp <= 0) killEnemy(en);
      }
      endTurn();
    }

    function canSeePlayer(ex, ey) {
      return Math.abs(ex - state.player.x) + Math.abs(ey - state.player.y) <= 12;
    }

    function bfsStep(startX, startY, goalX, goalY) {
      const queue = [{ x: startX, y: startY }];
      const came = new Map();
      const key = (x, y) => `${x},${y}`;
      came.set(key(startX, startY), null);
      let found = false;

      while (queue.length > 0) {
        const cur = queue.shift();
        if (cur.x === goalX && cur.y === goalY) {
          found = true;
          break;
        }
        const dirs = [
          [1, 0],
          [-1, 0],
          [0, 1],
          [0, -1]
        ];
        for (const [dx, dy] of dirs) {
          const nx = cur.x + dx;
          const ny = cur.y + dy;
          const k = key(nx, ny);
          if (!isWalkable(nx, ny) || came.has(k)) continue;
          if (enemyAt(nx, ny) && !(nx === goalX && ny === goalY)) continue;
          came.set(k, cur);
          queue.push({ x: nx, y: ny });
        }
      }

      if (!found) return null;
      let node = { x: goalX, y: goalY };
      let prev = came.get(key(node.x, node.y));
      while (prev && !(prev.x === startX && prev.y === startY)) {
        node = prev;
        prev = came.get(key(node.x, node.y));
      }
      return node;
    }

    function enemyTurn() {
      for (const en of state.enemies) {
        if (Math.abs(en.x - state.player.x) + Math.abs(en.y - state.player.y) === 1) {
          enemyAttack(en);
          if (state.gameOver) return;
          continue;
        }
        let moved = false;
        if (canSeePlayer(en.x, en.y)) {
          const step = bfsStep(en.x, en.y, state.player.x, state.player.y);
          if (step && !(step.x === state.player.x && step.y === state.player.y) && !enemyAt(step.x, step.y)) {
            en.x = step.x;
            en.y = step.y;
            moved = true;
          }
        }
        if (!moved) {
          const dirs = shuffle([
            [1, 0],
            [-1, 0],
            [0, 1],
            [0, -1]
          ]);
          for (const [dx, dy] of dirs) {
            const nx = en.x + dx;
            const ny = en.y + dy;
            if (!isWalkable(nx, ny)) continue;
            if (enemyAt(nx, ny)) continue;
            if (nx === state.player.x && ny === state.player.y) continue;
            en.x = nx;
            en.y = ny;
            break;
          }
        }

        if (Math.abs(en.x - state.player.x) + Math.abs(en.y - state.player.y) === 1) {
          enemyAttack(en);
          if (state.gameOver) return;
        }
      }
    }

    function hungerTurn() {
      state.player.hunger = Math.max(0, state.player.hunger - 1);
      state.starving = state.player.hunger === 0;
      if (state.starving) {
        state.player.hp -= 1;
        addLog("ピンチ！ 空腹ダメージ1");
        if (state.player.hp <= 0) {
          state.player.hp = 0;
          state.gameOver = true;
          addLog("空腹で倒れた… Rで再開");
        }
      }
    }

    function iboTurn() {
      if (state.iboCooldown > 0) state.iboCooldown -= 1;
      if (state.player.hunger <= 0) return;
      if (state.player.ibo >= state.player.iboMax) return;
      if (state.iboCooldown !== 0) return;
      if (Math.random() < 0.01) {
        state.player.ibo += 1;
        state.iboCooldown = 10;
        addLog("イボがはえた！");
      }
    }

    function endTurn() {
      enemyTurn();
      if (state.gameOver) return render();
      hungerTurn();
      if (state.gameOver) return render();
      iboTurn();
      render();
    }

    function restartGame() {
      state.floor = 1;
      state.player.hp = 20;
      state.player.maxHp = 20;
      state.player.atk = 3;
      state.player.def = 1;
      state.player.hunger = 1000;
      state.player.ibo = 0;
      state.player.exp = 0;
      state.player.level = 1;
      state.logs = [];
      state.gameOver = false;
      state.starving = false;
      addLog("ぼじろーぐ開始！");
      setupFloor();
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key;
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " ", "a", "A", "b", "B", "r", "R"].includes(key)) {
        e.preventDefault();
      }
      if (key === "R" || key === "r") return restartGame();
      if (state.gameOver) return;

      if (key === "ArrowUp") movePlayer(0, -1);
      else if (key === "ArrowDown") movePlayer(0, 1);
      else if (key === "ArrowLeft") movePlayer(-1, 0);
      else if (key === "ArrowRight") movePlayer(1, 0);
      else if (key === " ") waitTurn();
      else if (key === "A" || key === "a") iboBeam();
      else if (key === "B" || key === "b") eatIbo();
    });

    restartGame();
  </script>
</body>
</html>
