    function handleDebugKey(e){
  if(state.editingName || state.gameOver || state.gameClear || state.inputLocked) return false;

  if(e.shiftKey && e.code === "KeyD"){
    state.debugMode = !state.debugMode;
    state.debugFloorBuffer = "";
    addLog(`[DEBUG] 調整モード ${state.debugMode ? "ON" : "OFF"}`);
    render();
    return true;
  }

  if(!state.debugMode) return false;

  if(e.shiftKey && /^Digit[0-9]$/.test(e.code)){
    const digit = e.code.slice(-1);
    state.debugFloorBuffer += digit;
    if(state.debugFloorBuffer.length === 1){
      addLog(`[DEBUG] ジャンプ入力: ${state.debugFloorBuffer}_`);
      render();
      return true;
    }
    const targetFloor = Number.parseInt(state.debugFloorBuffer, 10);
    if(Number.isInteger(targetFloor) && targetFloor >= 1) debugJumpToFloor(targetFloor);
    else {
      addLog(`[DEBUG] 無効なジャンプ入力: ${state.debugFloorBuffer}`);
      state.debugFloorBuffer = "";
      render();
    }
    return true;
  }

  const code = (e.code || "").toLowerCase();
  if(code === "keya"){
    debugAdjustPlayer("ATK+1", ()=>{ state.player.baseAtk += 1; return true; });
    return true;
  }
  if(code === "keys"){
    debugAdjustPlayer("DEF+1", ()=>{ state.player.baseDef += 1; return true; });
    return true;
  }
  if(code === "keyh"){
    debugAdjustPlayer("HP全快", ()=>{
      if(state.player.hp >= state.player.maxHp) return false;
      state.player.hp = state.player.maxHp;
      return true;
    });
    return true;
  }
  if(code === "keyj"){
    debugAdjustPlayer("満腹度全快", ()=>{
      if(state.player.hunger >= state.player.hungerMax) return false;
      state.player.hunger = state.player.hungerMax;
      updateHungerWarning();
      return true;
    });
    return true;
  }
  if(code === "keyv"){
    debugAdjustPlayer("視界+1", ()=>{
      const nextVision = Math.min(state.player.visionMax, state.player.vision + 1);
      if(nextVision === state.player.vision) return false;
      state.player.vision = nextVision;
      return true;
    });
    return true;
  }
  if(code === "keyb"){
    debugAdjustPlayer("視界-1", ()=>{
      const nextVision = Math.max(state.player.visionMin, state.player.vision - 1);
      if(nextVision === state.player.vision) return false;
      state.player.vision = nextVision;
      return true;
    });
    return true;
  }
  if(code === "keye"){
    debugAdjustPlayer("経験値付与", ()=>{
      state.player.exp += expToNextLevel();
      maybeLevelUp();
      return true;
    });
    return true;
  }
  return false;
}

    function initializeRunState(){
      state.floor = 1;
      state.player = createInitialPlayer();
      state.invSize = INITIAL_INV_SIZE;
      state.inventory = createEmptyInventory(INITIAL_INV_SIZE);
      normalizeInventorySize();
      state.score = 0;
      state.turns = 0;
      state.logs = [];
      state.gameOver = false;
      state.gameClear = false;
      state.starving = false;
      state.hungerLowNotified = false;
      state.floorEventType = "normal";
      state.floorObjects = [];
      state.bossCleared = false;
      state.clearLadder = null;
      state.endingVisible = false;
      state.endingPhase = "hidden";
      state.endingStarted = false;
      state.bestUpdatedOnClear = false;
      state.endingReturnPromptVisible = false;
      state.endingReturnReady = false;
      state.endingReturnStarted = false;
      state.endingReturnStarVisible = false;
      state.titleBestStar = false;
      state.seen = createVisibilityGrid();
      state.visibleNow = createVisibilityGrid();
      state.kills = buildEmptyKillMap();
      state.editingName = false;
      state.nameInput = playerName();
      state.nameInputError = "";
      state.isComposingName = false;
      state.blockedWallMoveKey = null;
      state.debugFloorBuffer = "";
      state.debugMode = false;
    }

    function restartGame(){
      if(state.editingName) return;
      initializeRunState();
      const starterItemType = grantStarterItem();
      addLog(`ぼじろーぐ開始！ 初期アイテム: ${spriteForItemKey(starterItemType)}`); setupFloor();
    }

    if(nameImeInputEl){
      nameImeInputEl.addEventListener("input", ()=>{
        if(!state.editingName) return;
        const trimmed = trimPlayerNameToLimit(nameImeInputEl.value);
        if(nameImeInputEl.value !== trimmed) nameImeInputEl.value = trimmed;
        state.nameInput = trimmed;
        state.nameInputError = "";
        render();
      });
      nameImeInputEl.addEventListener("compositionstart", ()=>{
        if(!state.editingName) return;
        state.isComposingName = true;
      });
      nameImeInputEl.addEventListener("compositionend", ()=>{
        if(!state.editingName) return;
        state.isComposingName = false;
        const trimmed = trimPlayerNameToLimit(nameImeInputEl.value);
        if(nameImeInputEl.value !== trimmed) nameImeInputEl.value = trimmed;
        state.nameInput = trimmed;
        state.nameInputError = "";
        render();
      });
      nameImeInputEl.addEventListener("blur", ()=>{
        if(!state.editingName) return;
        requestAnimationFrame(syncNameInputElement);
      });
    }

    window.addEventListener("resize", () => {
      applySharedUiScale();
      renderMiniMap();
    });

    window.addEventListener("keydown", (e)=>{
      const key=e.key;
      if(state.editingName){
        if(key === "Escape"){
          e.preventDefault();
          cancelNameInputMode();
          return;
        }
        if(key === "Enter"){
          if(state.isComposingName || e.isComposing) return;
          e.preventDefault();
          confirmPlayerName();
          return;
        }
        if(nameImeInputEl && document.activeElement !== nameImeInputEl) syncNameInputElement();
        return;
      }
      if(state.blockedWallMoveKey && key!==state.blockedWallMoveKey) state.blockedWallMoveKey = null;
      if(DEBUG_BUILD && handleDebugKey(e)){
        e.preventDefault();
        return;
      }
      if(key === "Delete"){
        e.preventDefault();
        resetBestScore();
        return;
      }
      const isInventoryDigitCode = /^Digit[1-6]$/.test(e.code);
      if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," ","a","A","b","B","m","M","r","R","n","N"].includes(key) || isInventoryDigitCode) e.preventDefault();
      unlockAudioContext().catch(()=>{});
      if(key==="m"||key==="M") return toggleSound();
      if((key==="n"||key==="N") && (state.turns===0 || state.gameOver || state.gameClear)) return beginNameInputMode();
      if(key==="r"||key==="R"){
        if(state.gameClear){
          if(state.endingPhase === "thanks" && state.endingReturnReady && !state.endingReturnStarted) return startEndingReturnSequence();
          if(state.endingPhase === "thanks" || state.endingPhase === "returnName") return;
        }
        return restartGame();
      }
      if(state.gameOver||state.gameClear||state.inputLocked) return;
      if(key==="ArrowUp"){
        if(state.blockedWallMoveKey===key) return;
        movePlayer(0,-1,key);
      }
      else if(key==="ArrowDown"){
        if(state.blockedWallMoveKey===key) return;
        movePlayer(0,1,key);
      }
      else if(key==="ArrowLeft"){
        if(state.blockedWallMoveKey===key) return;
        movePlayer(-1,0,key);
      }
      else if(key==="ArrowRight"){
        if(state.blockedWallMoveKey===key) return;
        movePlayer(1,0,key);
      }
      else if(key===" ") waitTurn();
      else if(key==="a"||key==="A") iboBeam();
      else if(key==="b"||key==="B") eatIbo();
      else if(/^Digit[1-6]$/.test(e.code) && !e.repeat && !inventoryKeyDownAt.has(e.code)) inventoryKeyDownAt.set(e.code, performance.now());
    });

    window.addEventListener("keyup", (e)=>{
      if(state.editingName) return;
      if(!/^Digit[1-6]$/.test(e.code)) return;
      const downAt = inventoryKeyDownAt.get(e.code);
      if(downAt===undefined) return;
      inventoryKeyDownAt.delete(e.code);
      if(state.gameOver || state.gameClear || state.inputLocked) return;
      const slotIndex = Number.parseInt(e.code.slice(-1), 10) - 1;
      const pressMs = performance.now() - downAt;
      if(pressMs >= INVENTORY_LONG_PRESS_MS) dropInventorySlot(slotIndex);
      else useInventory(slotIndex);
    });

    function bootGame(){
      addLog("スタート画面: Rで開始 / Nで名前入力");
      render();
    }
  </script>
  <script src="ending.js"></script>
  <script>
    bootGame();
  </script>
</body>
</html>
