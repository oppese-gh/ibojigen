<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ぼじろーぐ</title>
  <style>
    :root {
      --bg:#111;
      --text:#f2f2f2;
      --accent:#7ad1ff;
      --line:#464646;
      --line-soft:#2e2e2e;
      --panel-inner:#101010;
      --panel-shadow:inset 0 0 0 1px rgba(255,255,255,.02), inset 0 8px 18px rgba(0,0,0,.2);
      --mono-font:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono","BIZ UDゴシック","Noto Sans Mono CJK JP",monospace;
    }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at 50% 30%, #161616, #101010 70%); color:var(--text); font-family:var(--mono-font); padding:clamp(6px,0.9vw,16px); }
    .game-screen {
      --ui-scale:1;
      --font-base:clamp(12px, calc(0.28vw + 0.38vh + var(--ui-scale) * 0.58rem), 20px);
      --font-small:clamp(11px, calc(0.2vw + 0.24vh + var(--ui-scale) * 0.5rem), 16px);
      --font-title:clamp(15px, calc(0.38vw + 0.34vh + var(--ui-scale) * 0.78rem), 25px);
      --cell-font-size:clamp(26px, calc(0.46vw + 0.5vh + 0.95rem), 30px);
      width:min(calc(100vw - clamp(12px,1.6vw,30px)), calc((100vh - clamp(12px,1.6vw,30px)) * 16 / 9));
      aspect-ratio:16/9;
      background:linear-gradient(180deg,#1d1d1d,#161616);
      border:1px solid #3a3a3a;
      border-radius:14px;
      box-shadow:0 12px 36px rgba(0,0,0,.42);
      display:grid;
      grid-template-columns:repeat(16,minmax(0,1fr));
      grid-template-rows:repeat(9,minmax(0,1fr));
      overflow:hidden;
      font-family:var(--mono-font);
      font-size:var(--font-base);
    }
    .region { padding:2px; min-width:0; min-height:0; }
    .panel { width:100%; height:100%; border:1px solid var(--line); background:var(--panel-inner); padding:clamp(4px,0.35vw,8px); overflow:hidden; box-shadow:var(--panel-shadow); border-radius:6px; }

    #region-main { grid-column:1/10; grid-row:1/10; }
    #region-minimap { grid-column:10/12; grid-row:1/3; }
    #region-help { grid-column:12/17; grid-row:1/3; }
    #region-status { grid-column:10/17; grid-row:3/8; }
    #region-item-slots { grid-column:10/17; grid-row:8/10; }
    #region-text-top, #region-text-main, #region-reserved, #region-system { display:none; }

    .game-main-panel { padding:clamp(2px,0.2vw,4px); display:flex; align-items:center; justify-content:center; }
    #game-main-frame { width:100%; height:100%; aspect-ratio:1/1; max-width:100%; max-height:100%; display:flex; }
    #grid { position:relative; margin:0; display:grid; grid-template-columns:repeat(13,minmax(0,1fr)); grid-template-rows:repeat(13,minmax(0,1fr)); width:100%; height:100%; aspect-ratio:1/1; background:#0d0d0d; border:1px solid #4f4f4f; overflow:hidden; user-select:none; box-shadow:inset 0 0 22px rgba(0,0,0,.45); }
    #projectile-layer { position:absolute; inset:0; pointer-events:none; z-index:2; }
    #damage-popup-layer { position:absolute; inset:0; pointer-events:none; z-index:3; }
    .projectile { position:absolute; display:flex; align-items:center; justify-content:center; text-align:center; }
    .damage-popup {
      position:absolute;
      pointer-events:none;
      z-index:3;
      font-weight:900;
      line-height:1;
      animation:damagePopup 620ms ease-out forwards;
      text-shadow:0 2px 0 rgba(0,0,0,.7), 0 0 4px rgba(0,0,0,.6);
      will-change:transform, opacity;
    }
    .damage-normal { color:#fff; }
    .damage-crit { color:#ffd84a; }
    .damage-heal { color:#59e37f; }
    @keyframes damagePopup {
      0% { transform:translate(-50%, -15%); opacity:1; }
      100% { transform:translate(-50%, -85%); opacity:0; }
    }
    .cell { display:flex; align-items:center; justify-content:center; text-align:center; line-height:.92; letter-spacing:-0.01em; font-size:var(--cell-font-size,24px); font-family:var(--mono-font); }

    #minimap-wrap { width:100%; height:100%; background:#0d0d0d; border:1px solid #555; padding:clamp(3px,0.34vw,7px); display:flex; align-items:center; justify-content:center; box-shadow:var(--panel-shadow); border-radius:4px; }
    #minimap { display:block; width:100%; height:100%; max-width:100%; max-height:100%; background:#070707; image-rendering:pixelated; }

    #status-layout { width:100%; height:100%; display:grid; grid-template-rows:minmax(0,0.82fr) minmax(0,1.18fr); gap:clamp(2px,0.22vw,5px); }
    #status {
      width:100%; height:100%; margin:0;
      padding:clamp(4px, calc(var(--ui-scale) * 0.24rem), 7px) clamp(5px, calc(var(--ui-scale) * 0.28rem), 8px);
      background:linear-gradient(180deg,#171717,#121212);
      border:1px solid var(--line-soft);
      font-size:var(--font-base);
      line-height:1.28;
      white-space:normal;
      overflow:hidden;
      box-shadow:var(--panel-shadow);
      display:grid;
      gap:clamp(2px, calc(var(--ui-scale) * 0.16rem), 4px);
      align-content:start;
      border-radius:4px;
    }
    .status-line { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:clamp(2px,0.22vw,4px); }
    .status-line.line-top { grid-template-columns:minmax(0,2fr) repeat(2,minmax(0,1fr)); }
    .status-line.line-exp { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .status-line.line-mid { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .status-line.line-gauge { grid-template-columns:minmax(0,1fr); align-items:stretch; justify-items:stretch; gap:clamp(5px,0.34vw,8px); }
    .status-pill { border:1px solid #3b3b3b; background:#0f0f0f; border-radius:4px; padding:1px 5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .status-line.line-top .status-pill:nth-child(2) { color:#9fd2ff; font-weight:700; }
    .status-alerts { display:flex; gap:4px; flex-wrap:wrap; min-height:1.08em; align-content:flex-start; font-weight:700; letter-spacing:.04em; }
    .monster-alert { color:#ff6565; font-weight:700; line-height:1.1; }
    .status-alerts .monster-alert { background:#2a0000; border:1px solid #b00000; padding:2px 6px; border-radius:4px; }
    .stat { display:flex; align-items:center; flex-wrap:nowrap; gap:6px; min-width:0; width:100%; }
    .label { min-width:3.8em; white-space:nowrap; flex:0 0 auto; }
    .meter { flex:1 1 auto; min-width:0; width:auto; height:clamp(11px, calc(var(--ui-scale) * 0.7rem), 15px); border:1px solid #666; background:#242424; border-radius:4px; overflow:hidden; }
    .fill { display:block; height:100%; width:0; background:#2ecc71; border-radius:inherit; }
    .num { white-space:nowrap; flex:0 0 auto; min-width:max-content; text-align:right; }
    .status-line.line-gauge .stat { padding-right:2px; }
    .tone-yellow .fill { background:#2ecc71; }
    .tone-orange .fill { background:#ff9800; }
    .tone-red .fill { background:#b53b2f; }
    .tone-yellow .num { color:#2ecc71; }
    .tone-orange .num { color:#ff9800; }
    .tone-red .num { color:#e74c3c; }
    .stat.tone-red .meter { border-color:#e74c3c; }

    #log {
      width:100%; height:100%;
      border:1px solid var(--line);
      background:#101010;
      padding:clamp(5px, calc(var(--ui-scale) * 0.3rem), 8px);
      line-height:1.3;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:clamp(3px,0.2vw,5px);
      box-shadow:var(--panel-shadow);
      border-radius:4px;
      overflow:hidden;
    }
    #log::before { content:"BATTLE LOG"; color:#94cfff; letter-spacing:.05em; font-size:var(--font-small); }
    #log-latest { min-height:0; display:grid; align-content:start; gap:clamp(3px,0.2vw,5px); }
    #log-history { display:none; }
    .log-block { border:1px solid #3f3f3f; background:#141414; border-radius:4px; padding:clamp(3px,0.3vw,6px) clamp(5px,0.46vw,8px); }
    .log-block.latest { border-color:#5b7da2; box-shadow:inset 0 0 0 1px rgba(122,209,255,.2); }
    .log-line { min-height:1.2em; width:30ch; max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:clip; font-family:var(--mono-font); }

    #aux-layout { width:100%; height:100%; display:grid; grid-template-rows:auto auto 1fr; gap:clamp(4px,0.35vw,8px); }
    #log-top { width:100%; border:1px solid var(--line); background:#101010; padding:clamp(5px,0.35vw,8px); box-shadow:var(--panel-shadow); border-radius:4px; overflow:hidden; }
    #app-title { margin:0 0 clamp(2px,0.2vw,4px); color:var(--accent); font-size:var(--font-title); line-height:1.1; letter-spacing:.02em; }
    #name-input-wrap { margin-top:4px; display:none; }
    #name-input-wrap.show { display:block; }
    #name-ime-input { width:min(100%,30ch); font-size:var(--font-base); padding:clamp(4px,0.26vw,7px) clamp(6px,0.42vw,10px); border:1px solid #555; border-radius:5px; background:#0f0f0f; color:var(--text); font-family:var(--mono-font); }
    #help { color:#ccc; font-size:var(--font-small); line-height:1.32; border:1px solid #383838; background:#101010; border-radius:4px; padding:clamp(5px,0.3vw,8px); overflow:hidden; }
    #system-info { width:100%; height:100%; font-size:clamp(12px, calc(0.22vw + 0.3vh + var(--ui-scale) * 0.58rem), 18px); line-height:1.4; color:#c6c6c6; overflow:hidden; border:1px solid var(--line-soft); background:#111; padding:clamp(5px,0.34vw,9px); box-shadow:var(--panel-shadow); border-radius:4px; }

    #item-slot-panel { padding:clamp(3px,0.2vw,5px) clamp(3px,0.24vw,6px); }
    #item-slots { width:100%; height:100%; display:flex; align-items:stretch; justify-content:space-between; gap:clamp(4px,0.28vw,7px); }
    .item-slot { height:100%; aspect-ratio:0.94; border:1px solid #5b5b5b; background:linear-gradient(180deg,#161616,#0d0d0d); display:flex; flex-direction:column; align-items:center; justify-content:space-between; border-radius:4px; padding:clamp(2px,0.15vw,4px); box-shadow:inset 0 0 0 1px rgba(255,255,255,.03); overflow:hidden; transition:transform .1s ease, box-shadow .1s ease; }
    .item-slot:hover { transform:scale(1.05); box-shadow:0 0 6px rgba(122,209,255,.3); }
    .item-slot .slot-key { color:#9fd2ff; font-size:clamp(10px, calc(var(--ui-scale) * 0.72rem), 14px); font-weight:700; line-height:1; }
    .item-slot .slot-item { font-size:clamp(28px, var(--slot-icon-size, calc(var(--ui-scale) * 2.5rem)), 60px); display:flex; align-items:center; justify-content:center; flex:1; width:100%; line-height:.92; padding:0; }
    .item-slot.empty { border-style:dashed; color:#8f8f8f; }

    .line { margin:0; }
    @media (max-width:1100px) {
      .region { padding:2px; }
      .panel { padding:4px; }
      #status-layout, #aux-layout { gap:4px; }
      #item-slots { gap:4px; }
    }
    #ending-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.52); display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 1.6s ease; z-index:30; backdrop-filter: blur(3px); }
    #ending-overlay.show { opacity:1; pointer-events:auto; }
    #ending-content { width:min(100%,720px); max-height:90vh; overflow:hidden; text-align:center; padding:20px; color:#fff; }
    .ending-title { font-size:44px; letter-spacing:.08em; }
    .ending-credits-wrap { position:relative; height:70vh; overflow:hidden; }
    .ending-credits-roll { position:absolute; left:50%; transform:translateX(-50%); width:100%; white-space:pre-line; line-height:1.8; font-size:24px; animation:ending-credits-scroll 15s linear forwards; }
    .ending-stats { white-space:pre-line; line-height:1.8; font-size:28px; }
    .ending-thanks { font-size:42px; letter-spacing:.08em; }
    .ending-return-prompt { margin-top:56px; font-size:24px; opacity:.9; }
    .ending-return-name-wrap { display:flex; justify-content:center; align-items:center; gap:8px; min-height:180px; }
    .ending-return-star { font-size:56px; opacity:0; transition:opacity 2s ease; }
    .ending-return-star.show { opacity:1; }
    .ending-return-name { font-size:64px; letter-spacing:.08em; }
    @keyframes ending-credits-scroll {
      from { transform:translate(-50%, 100%); }
      to { transform:translate(-50%, -100%); }
    }
  </style>
</head>
<body>
  <main class="game-screen">
    <section id="region-main" class="region">
      <div class="panel game-main-panel">
        <div id="game-main-frame">
          <div id="grid" aria-label="game map" role="img"></div>
        </div>
      </div>
    </section>

    <section id="region-minimap" class="region">
      <div id="minimap-wrap">
        <canvas id="minimap" width="128" height="128" aria-label="minimap" role="img"></canvas>
      </div>
    </section>

    <section id="region-help" class="region">
      <div class="panel">
        <div id="aux-layout">
          <div id="log-top">
            <h1 id="app-title">ぼじろーぐ <span id="version"></span></h1>
            <div id="name-input-wrap" aria-live="polite">
              <label for="name-ime-input">名前入力</label>
              <input id="name-ime-input" type="text" inputmode="text" autocomplete="off" maxlength="10" />
            </div>
          </div>
          <div id="help">操作: ↑↓←→移動 / Space 待機 / A いぼビーム / B イボ食い / 1-6 短押し:使用・長押し:足元ドロップ / M SE ON/OFF / R リスタート / N 名前入力</div>
          <div id="system-info"></div>
        </div>
      </div>
    </section>

    <section id="region-status" class="region">
      <div class="panel">
        <div id="status-layout">
          <div id="status"></div>
          <div id="log">
            <div id="log-latest"></div>
            <div id="log-history"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="region-item-slots" class="region">
      <div id="item-slot-panel" class="panel">
        <div id="item-slots"></div>
      </div>
    </section>

    <section id="region-text-top" class="region" aria-hidden="true"></section>
    <section id="region-text-main" class="region" aria-hidden="true"></section>
    <section id="region-reserved" class="region" aria-hidden="true"></section>
    <section id="region-system" class="region" aria-hidden="true"></section>
  </main>
  <div id="ending-overlay" aria-hidden="true">
    <div id="ending-content"></div>
  </div>

  <script>
    "use strict";

    const MAP_W = 32;
    const MAP_H = 32;
    const WIDTH = MAP_W;
    const HEIGHT = MAP_H;
    const CAMERA_SIZE = 13;
    const CAMERA_HALF = Math.floor(CAMERA_SIZE / 2);
    const MAX_LOG = 100;
    const TILE_WALL = "#";
    const TILE_FLOOR = ".";
    const PROJECTILE_STEP_MS = 40;
    const MINIMAP_SIZE = 128;
    const MINIMAP_TILE = 4;
    // wizardは遠距離攻撃が強いため、近接攻撃を少し弱くする
    const WIZARD_MELEE_ATK_PENALTY = 3;
    const DEFAULT_PLAYER_NAME = "あさひっこ";
    const MAX_PLAYER_NAME_LENGTH = 10;
    const INITIAL_INV_SIZE = 5;
    const ASAHIYAMA_INV_SIZE = 6;
    const INVENTORY_LONG_PRESS_MS = 500;
    const DEBUG_BUILD = true;
    const SOUND_STORAGE_KEY = "bojirogue_soundEnabled";
    const APP_VERSION = "build-#107";
    const SPRITES = {
      player:"🧔", wall:"🧱", floor:".", ladder:"🪜", orb:"🟣", starBeam:"✨",
      dog:"🐕", wolf:"🐺", lion:"🦁", dragon:"🐉", ghost:"👻", zombie:"🧟", skull:"☠️", invader:"👾", spider:"🕷️", bat:"🦇", snake:"🐍", dino:"🦖", chick:"🐥", mimic:"🎁", rain:"🌧️", wizard:"🧙‍♂️", bossAsahiyama:"🌋",
      food:"🍙", meat:"🥩", sushi:"🍣", feast:"🍖", potion:"🧪", map:"👁", shield:"🛡️", axe:"🪓", diamond:"💎", dagger:"🗡️", bow:"🏹", wand:"🪄", fire:"🔥", star:"🌟", sun:"🌤️", poop:"💩", bean:"🫘", scroll:"📜", asahiyama:"🏔️"
    };

    const ENEMY_DEFS = [
      {id:1,key:"dog",char:SPRITES.dog,baseHp:6,baseAtk:2,baseDef:0,exp:1,score:10,dropRuleRef:"enemyCommon"},
      {id:15,key:"bat",char:SPRITES.bat,baseHp:8,baseAtk:3,baseDef:0,exp:2,score:20,dropRuleRef:"enemyCommon"},
      {id:2,key:"wolf",char:SPRITES.wolf,baseHp:10,baseAtk:4,baseDef:1,exp:3,score:35,dropRuleRef:"enemyCommon"},
      {id:3,key:"lion",char:SPRITES.lion,baseHp:12,baseAtk:6,baseDef:2,exp:5,score:60,dropRuleRef:"enemyCommon"},
      {id:4,key:"dragon",char:SPRITES.dragon,baseHp:20,baseAtk:8,baseDef:3,exp:10,score:120,dropRuleRef:"enemyCommon"},
      {id:5,key:"ghost",char:SPRITES.ghost,baseHp:12,baseAtk:4,baseDef:1,exp:6,score:70,dropRuleRef:"enemyCommon"},
      {id:6,key:"zombie",char:SPRITES.zombie,baseHp:13,baseAtk:4,baseDef:1,exp:5,score:45,dropRuleRef:"enemyCommon"},
      {id:7,key:"skull",char:SPRITES.skull,baseHp:15,baseAtk:5,baseDef:1,exp:7,score:80,dropRuleRef:"enemyCommon"},
      {id:8,key:"invader",char:SPRITES.invader,baseHp:18,baseAtk:8,baseDef:3,exp:15,score:160,dropRuleRef:"enemyCommon"},
      {id:9,key:"spider",char:SPRITES.spider,baseHp:7,baseAtk:4,baseDef:1,exp:3,score:30,dropRuleRef:"enemyCommon"},
      {id:10,key:"chick",char:SPRITES.chick,baseHp:100,baseAtk:0,baseDef:1,exp:50,score:0,dropRule:{mode:"none"}},
      {id:11,key:"mimic",char:SPRITES.mimic,baseHp:15,baseAtk:5,baseDef:2,exp:8,score:90,dropRule:{mode:"profile", ref:"mimicRare"},flags:["specialDrop"]},
      {id:12,key:"rain",char:SPRITES.rain,baseHp:10,baseAtk:0,baseDef:1,exp:5,score:55,dropRuleRef:"enemyCommon"},
      {id:13,key:"wizard",char:SPRITES.wizard,baseHp:12,baseAtk:7,baseDef:1,exp:14,score:150,dropRuleRef:"enemyCommon"},
      {id:16,key:"snake",char:SPRITES.snake,baseHp:12,baseAtk:5,baseDef:1,exp:5,score:50,dropRuleRef:"enemyCommon"},
      {id:17,key:"dino",char:SPRITES.dino,baseHp:25,baseAtk:9,baseDef:2,exp:9,score:105,dropRuleRef:"enemyCommon"},
      {id:14,key:"bossAsahiyama",char:SPRITES.bossAsahiyama,baseHp:220,baseAtk:12,baseDef:4,exp:100,score:1000,dropRule:{mode:"none"}}
    ];

    const ITEM_DEFS = [
      {id:1,key:"food",char:SPRITES.food,category:"food",rarity:1,effectKey:"food",pickupMode:"inventory"},
      {id:2,key:"meat",char:SPRITES.meat,category:"food",rarity:1,effectKey:"meat",pickupMode:"inventory"},
      {id:3,key:"sushi",char:SPRITES.sushi,category:"food",rarity:2,effectKey:"sushi",pickupMode:"inventory"},
      {id:4,key:"feast",char:SPRITES.feast,category:"food",rarity:4,effectKey:"feast",pickupMode:"inventory"},
      {id:5,key:"potion",char:SPRITES.potion,category:"heal",rarity:1,effectKey:"potion",pickupMode:"inventory"},
      {id:6,key:"map",char:SPRITES.map,category:"utility",rarity:2,effectKey:"map",pickupMode:"inventory"},
      {id:7,key:"sun",char:SPRITES.sun,category:"utility",rarity:2,effectKey:"sun",pickupMode:"instant"},
      {id:8,key:"shield",char:SPRITES.shield,category:"armor",rarity:3,effectKey:"shield",pickupMode:"instant"},
      {id:9,key:"axe",char:SPRITES.axe,category:"weapon",rarity:3,effectKey:"axe",pickupMode:"inventory"},
      {id:10,key:"diamond",char:SPRITES.diamond,category:"armor",rarity:3,effectKey:"diamond",pickupMode:"inventory"},
      {id:11,key:"dagger",char:SPRITES.dagger,category:"weapon",rarity:3,effectKey:"dagger",pickupMode:"instant"},
      {id:16,key:"bow",char:SPRITES.bow,category:"weapon",rarity:4,effectKey:"bow",pickupMode:"inventory"},
      {id:17,key:"wand",char:SPRITES.wand,category:"weapon",rarity:5,effectKey:"wand",pickupMode:"inventory"},
      {id:12,key:"star",char:SPRITES.star,category:"utility",rarity:5,effectKey:"star",pickupMode:"inventory"},
      {id:13,key:"poop",char:SPRITES.poop,category:"junk",rarity:2,effectKey:"poop",pickupMode:"inventory"},
      {id:14,key:"bean",char:SPRITES.bean,category:"growth",rarity:4,effectKey:"bean",pickupMode:"instant"},
      {id:15,key:"scroll",char:SPRITES.scroll,category:"utility",rarity:4,effectKey:"scroll",pickupMode:"inventory"}
    ];
    const ITEM_DEF_BY_KEY = Object.fromEntries(ITEM_DEFS.map((d)=>[d.key,d]));
    const ITEM_DEF_BY_ID = Object.fromEntries(ITEM_DEFS.map((d)=>[d.id,d]));

    function itemDefByKey(key){ return ITEM_DEF_BY_KEY[key] || null; }
    function itemDefById(id){ return ITEM_DEF_BY_ID[id] || null; }
    function itemKeyFromDropEntry(entry){
      if(!entry) return null;
      if(entry.key) return entry.key;
      if(entry.type) return entry.type;
      if(entry.id !== undefined){
        const byId = itemDefById(entry.id);

async function unlockAudioContext(){
  const ctx = ensureAudioContext();
  if(!ctx) return null;

  if(ctx.state === "suspended"){
    try{
      await ctx.resume();
    }catch{}
  }

  return ctx;
}

    function playSe(type){
      if(!state.soundEnabled) return;
      const ctx = ensureAudioContext();
      if(!ctx) return;
      if(ctx.state === "suspended") return;
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.62, now);
      master.connect(ctx.destination);

      function playToneLayer(layer){
        const start = now + (layer.d || 0);
        const duration = Math.max(0.02, layer.t || 0.06);
        const end = start + duration;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = layer.w || "square";
        const fromFreq = layer.f0 ?? layer.f ?? 440;
        const toFreq = layer.f1 ?? fromFreq;
        osc.frequency.setValueAtTime(fromFreq, start);
        if(toFreq !== fromFreq) osc.frequency.exponentialRampToValueAtTime(Math.max(20, toFreq), end);
        const attack = Math.min(duration * 0.35, layer.a ?? 0.006);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.linearRampToValueAtTime(layer.v ?? 0.05, start + attack);
        gain.gain.exponentialRampToValueAtTime(0.0001, end);
        osc.connect(gain);
        gain.connect(master);
        osc.start(start);
        osc.stop(end + 0.01);
      }

      function playNoiseBurst({d=0,t=0.04,v=0.02,hp=700,lp=80}={}){
        const start = now + d;
        const length = Math.max(0.015, t);
        const frames = Math.max(1, Math.floor(ctx.sampleRate * length));
        const buffer = ctx.createBuffer(1, frames, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for(let i=0;i<frames;i++) data[i] = (Math.random()*2-1) * (1 - i/frames);
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        const hpFilter = ctx.createBiquadFilter();
        hpFilter.type = "highpass";
        hpFilter.frequency.setValueAtTime(hp, start);
        const lpFilter = ctx.createBiquadFilter();
        lpFilter.type = "lowpass";
        lpFilter.frequency.setValueAtTime(lp, start);
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.linearRampToValueAtTime(v, start + 0.003);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + length);
        source.connect(hpFilter);
        hpFilter.connect(lpFilter);
        lpFilter.connect(gain);
        gain.connect(master);
        source.start(start);
        source.stop(start + length + 0.01);
      }

      const tonesByType = {
        attack:[{f0:520,f1:420,t:0.055,w:"square",v:0.085},{f0:780,f1:650,t:0.04,w:"triangle",v:0.045,d:0.004}],
        hit:[{f0:220,f1:120,t:0.09,w:"sawtooth",v:0.105},{f0:130,f1:90,t:0.08,w:"square",v:0.06,d:0.01}],
        item:[{f0:640,f1:760,t:0.045,w:"triangle",v:0.06},{f0:960,f1:1240,t:0.05,w:"triangle",v:0.048,d:0.03}],
        levelup:[{f:520,t:0.06,w:"square",v:0.055},{f:660,t:0.06,w:"square",v:0.052,d:0.05},{f:880,t:0.085,w:"triangle",v:0.05,d:0.10}],
        clear:[{f:523,t:0.09,w:"triangle",v:0.055},{f:659,t:0.09,w:"triangle",v:0.05,d:0.08},{f:784,t:0.13,w:"triangle",v:0.048,d:0.16}],
        gameover:[{f0:320,f1:250,t:0.10,w:"sine",v:0.065},{f0:245,f1:185,t:0.12,w:"sine",v:0.06,d:0.09},{f0:185,f1:140,t:0.16,w:"triangle",v:0.055,d:0.2}],
        beam:[{f0:1200,f1:700,t:0.1,w:"square",v:0.06},{f0:900,f1:520,t:0.12,w:"sawtooth",v:0.038,d:0.012}],
        star:[{f0:860,f1:1220,t:0.055,w:"triangle",v:0.06},{f0:1180,f1:1620,t:0.06,w:"sine",v:0.045,d:0.04}],
        poison:[{f0:210,f1:140,t:0.11,w:"sawtooth",v:0.075},{f0:155,f1:110,t:0.09,w:"square",v:0.038,d:0.01}],
        stairs:[{f0:500,f1:580,t:0.05,w:"square",v:0.05},{f0:650,f1:760,t:0.055,w:"triangle",v:0.045,d:0.04}]
      };
      const tones = tonesByType[type] || [];
      try {
        for(const tone of tones) playToneLayer(tone);
        if(type === "attack") playNoiseBurst({t:0.022,v:0.012,hp:900,lp:3600});
        if(type === "hit") playNoiseBurst({t:0.03,v:0.024,hp:120,lp:1800});
        if(type === "beam") playNoiseBurst({t:0.028,v:0.013,hp:1000,lp:6000});
        if(type === "star") playNoiseBurst({d:0.03,t:0.03,v:0.012,hp:1200,lp:5500});
      } catch {
        // 音が鳴らせない環境でもゲーム進行を止めない
      }
      const tail = tones.reduce((m,t)=>Math.max(m,(t.d||0)+t.t), 0.1);
      master.gain.exponentialRampToValueAtTime(0.0001, now + tail + 0.03);
      setTimeout(()=>{ try { master.disconnect(); } catch {} }, Math.ceil((tail + 0.1) * 1000));
    }

    }

    function normalizeInventorySize(){
      if(state.inventory.length > state.invSize){
        state.inventory = state.inventory.slice(0, state.invSize);
      }
      while(state.inventory.length < state.invSize) state.inventory.push(null);
    }

    function invToString(){
      normalizeInventorySize();
      return state.inventory.map((slot)=>slot?slot.char:"▢").join(" ");
    }
    function isInventoryFull(){
      normalizeInventorySize();
      return state.inventory.every((slot)=>slot!==null);
    }

    function calcScore(){
      const killScore = Object.entries(state.kills).reduce((sum,[k,count])=>sum + count * (enemyDefByKey(k)?.score || 0),0);
      return killScore + state.floor * 50 + state.player.level * 30;
    }

    function finalizeScore(reasonText=""){
      state.score = calcScore();
      const didBestUpdate = state.score > state.bestScore;
      if(reasonText === "GAME CLEAR") state.bestUpdatedOnClear = didBestUpdate;
      if(didBestUpdate){ state.bestScore = state.score; state.bestName = playerName(); saveProfile(); addLog(`新記録！ BEST ${state.bestScore} (${reasonText})`); }
      else addLog(`SCORE ${state.score} / BEST ${state.bestScore} (${reasonText})`);
    }

    function resetBestScore(){
      if(state.turns===0 || state.gameOver===true){
        state.bestScore = 0;
        state.bestName = DEFAULT_PLAYER_NAME;
        state.titleBestStar = false;
        saveProfile();
        localStorage.removeItem("bojirogue_bestScore");
        addLog("ハイスコアをリセットした。");
      }else{
        addLog("ハイスコアのリセットは開始前かゲームオーバー時のみ。");
      }
      render();
    }

    // ===== Map / floor generation =====
    function createMap() {
      const map = Array.from({length:HEIGHT},()=>Array(WIDTH).fill(TILE_WALL));
      const rooms=[]; const roomCount=randInt(6,10); let attempts=0;
      while(rooms.length<roomCount && attempts<120){
        attempts++;
        const w=randInt(4,8), h=randInt(3,6), x=randInt(1,WIDTH-w-2), y=randInt(1,HEIGHT-h-2);
        const room={x,y,w,h,cx:x+Math.floor(w/2),cy:y+Math.floor(h/2)};
        const overlap = rooms.some((r)=>x-1<=r.x+r.w&&x+w+1>=r.x&&y-1<=r.y+r.h&&y+h+1>=r.y);
        if(overlap) continue;
        for(let yy=y;yy<y+h;yy++) for(let xx=x;xx<x+w;xx++) map[yy][xx]=TILE_FLOOR;
        if(rooms.length>0){ const prev=rooms[rooms.length-1]; carveCorridor(map, prev.cx, prev.cy, room.cx, room.cy); }
        rooms.push(room);
      }
      return {map, rooms};
    }

    function carveCorridor(map, x1,y1,x2,y2){
      let x=x1,y=y1;
      if(Math.random()<0.5){ while(x!==x2){map[y][x]=TILE_FLOOR; x += x<x2?1:-1;} while(y!==y2){map[y][x]=TILE_FLOOR; y += y<y2?1:-1;} }
      else { while(y!==y2){map[y][x]=TILE_FLOOR; y += y<y2?1:-1;} while(x!==x2){map[y][x]=TILE_FLOOR; x += x<x2?1:-1;} }
      map[y2][x2]=TILE_FLOOR;
    }

    function setupFloor(){
      if(state.floor===30){
        setupBossFloor();
        return;
      }
      // まれに部屋生成が0件になるため、安全に再生成する
      let built = createMap();
      let regenCount = 0;
      while(built.rooms.length===0 && regenCount<8){
        built = createMap();
        regenCount++;
      }
      if(built.rooms.length===0){
        const fallbackMap = Array.from({length:HEIGHT}, ()=>Array(WIDTH).fill(TILE_WALL));
        const fallbackRoom = {x:1,y:1,w:WIDTH-2,h:HEIGHT-2,cx:Math.floor(WIDTH/2),cy:Math.floor(HEIGHT/2)};
        for(let yy=fallbackRoom.y;yy<fallbackRoom.y+fallbackRoom.h;yy++) for(let xx=fallbackRoom.x;xx<fallbackRoom.x+fallbackRoom.w;xx++) fallbackMap[yy][xx]=TILE_FLOOR;
        built = {map:fallbackMap, rooms:[fallbackRoom]};
      }
      state.map=built.map; state.rooms=built.rooms; state.items=[]; state.enemies=[]; state.floorObjects=[]; state.revealed=false;
      state.seen = createVisibilityGrid();
      state.visibleNow = createVisibilityGrid();
      state.floorHasShield=false; state.floorHasAxe=false;
      state.bossCleared = false;
      state.clearLadder = null;
      state.player.floorAtkBuff = 0; state.player.floorDefBuff = 0; state.player.diamondWard = false;
      state.inputLocked=false; state.iboCooldown=0;
      const startRoom=state.rooms[0]; state.player.x=startRoom.cx; state.player.y=startRoom.cy;
      let far=state.rooms[0],best=-1;
      for(const r of state.rooms){ const d=Math.abs(r.cx-startRoom.cx)+Math.abs(r.cy-startRoom.cy); if(d>best){best=d; far=r;} }
      state.ladder={x:far.cx,y:far.cy};
      state.floorEventType = determineFloorEvent();
      const enemyMultiplier = state.floorEventType === "monsterHouse" ? 5 : 1;
      const initialItemCount = state.floorEventType === "monsterHouse" ? 0 : null;
      placeEnemies(enemyMultiplier);
      placeExtraLadderRoomEnemy(far, enemyMultiplier);
      placeItems(initialItemCount);
      placeTreasureEventObjects();
      placeAsahiyama();
      addLog(`第${state.floor}階に降りた。`);
      if(state.floorEventType === "monsterHouse") addLog("！！なんという　まものの気配！！");
      render();
    }

    function setupBossFloor(){
      // 30Fは特別フロア: 外周のみ壁、内側は大部屋
      const map = Array.from({length:HEIGHT}, (_,y)=>Array.from({length:WIDTH}, (_,x)=>{
        const isBorder = x===0 || y===0 || x===WIDTH-1 || y===HEIGHT-1;
        return isBorder ? TILE_WALL : TILE_FLOOR;
      }));
      state.map = map;
      state.rooms = [{x:1,y:1,w:WIDTH-2,h:HEIGHT-2,cx:Math.floor(WIDTH/2),cy:Math.floor(HEIGHT/2)}];
      state.items = [];
      state.enemies = [];
      state.floorObjects = [];
      state.floorEventType = "boss";
      state.revealed = true;
      state.seen = createVisibilityGrid();
      state.visibleNow = createVisibilityGrid();
      state.floorHasShield=false; state.floorHasAxe=false;
      state.bossCleared = false;
      state.clearLadder = null;
      state.player.floorAtkBuff = 0; state.player.floorDefBuff = 0; state.player.diamondWard = false;
      state.inputLocked=false; state.iboCooldown=0;

      state.player.x = Math.floor(WIDTH/2);
      state.player.y = HEIGHT - 4;
      state.ladder = {x:-1,y:-1};

      const bossX = Math.floor(WIDTH/2);
      const bossY = Math.floor(HEIGHT/2);
      state.enemies = state.enemies.filter((enemy)=>enemy.key!=="bossAsahiyama");
      state.enemies.push(spawnEnemy("bossAsahiyama", bossX, bossY));

      addLog("最深部にたどり着いた……");
      addLog("🌋あさひやまが、行く手を阻む！");
      addLog("[DEBUG] boss floor setup");
      addLog(`[DEBUG] enemy count: ${state.enemies.length}`);
      addLog(`[DEBUG] boss pos: ${bossX},${bossY}`);
      addLog(`[DEBUG] player pos: ${state.player.x},${state.player.y}`);
      render();
    }

    const isWalkable = (x,y) => x>=0&&x<WIDTH&&y>=0&&y<HEIGHT&&state.map[y][x]===TILE_FLOOR;
    const enemyAt = (x,y) => state.enemies.find((e)=>e.x===x&&e.y===y);
    const itemAt = (x,y) => state.items.find((i)=>i.x===x&&i.y===y);
    const objectAt = (x,y) => state.floorObjects.find((o)=>o.x===x&&o.y===y);

    function positionFree(x,y){
      if(!isWalkable(x,y)) return false;
      if(state.player.x===x&&state.player.y===y) return false;
      if(enemyAt(x,y)||itemAt(x,y)||objectAt(x,y)) return false;
      if(state.ladder.x===x&&state.ladder.y===y) return false;
      return true;
    }

    function hasEnemyWithinDistance(x,y,distance){
      return state.enemies.some((enemy)=>Math.abs(enemy.x-x)+Math.abs(enemy.y-y)<=distance);
    }

    function randomFloorPos(){
      const cells=[];
      for(let y=1;y<HEIGHT-1;y++) for(let x=1;x<WIDTH-1;x++) if(state.map[y][x]===TILE_FLOOR) cells.push({x,y});
      return shuffle(cells);
    }

    function weightedPick(pool){
      if(!pool || !pool.length) return null;
      const total = pool.reduce((s,r)=>s + (r.weight ?? r.rate ?? r.w ?? 0),0);
      if(total<=0) return null;
      let roll = Math.random()*total;
      for(const row of pool){
        roll -= (row.weight ?? row.rate ?? row.w ?? 0);
        if(roll<=0) return row;
      }
      return pool[pool.length-1];
    }
    function rollFromTable(table){
      const row = weightedPick(table);
      return itemKeyFromDropEntry(row);
    }
    function weightedEnemyKey(pool){ const total=pool.reduce((s,r)=>s+r.w,0); let roll=Math.random()*total; for(const row of pool){ roll-=row.w; if(roll<=0) return row.enemyKey; } return pool[pool.length-1].enemyKey; }
    const spriteForItemKey = (itemKey) => {
      const def = itemDefByKey(itemKey);
      if(def) return def.char;
      return SPRITES[itemKey] || SPRITES.star;
    };

    function createItem(itemKey){
      const def = itemDefByKey(itemKey);
      if(!def) return {key:itemKey, char:spriteForItemKey(itemKey)};
      return {id:def.id, key:def.key, char:def.char, category:def.category, rarity:def.rarity, effectKey:def.effectKey, pickupMode:def.pickupMode || "inventory"};
    }

    function placeItemAt(itemKey,x,y){
      if(itemKey==="shield" && state.floorHasShield) return false;
      if(itemKey==="axe" && state.floorHasAxe) return false;
      if(!positionFree(x,y)) return false;
      state.items.push({x,y,...createItem(itemKey)});
      if(itemKey==="shield") state.floorHasShield=true;
      if(itemKey==="axe") state.floorHasAxe=true;
      return true;
    }

    function placeItemAtPlayerTile(itemKey,x,y){
      if(itemKey==="shield" && state.floorHasShield) return false;
      if(itemKey==="axe" && state.floorHasAxe) return false;
      if(!isWalkable(x,y)) return false;
      if(enemyAt(x,y)||itemAt(x,y)||objectAt(x,y)) return false;
      if(state.ladder.x===x&&state.ladder.y===y) return false;
      state.items.push({x,y,...createItem(itemKey)});
      if(itemKey==="shield") state.floorHasShield=true;
      if(itemKey==="axe") state.floorHasAxe=true;
      return true;
    }

    function floorPowerTier(){ if(state.floor<=2)return 0; if(state.floor<=4)return 1; if(state.floor<=6)return 2; if(state.floor<=8)return 3; if(state.floor<=10)return 4; return 5+Math.floor((state.floor-10)/2); }

    function determineFloorEvent(){
      const hpLow = state.player.hp <= state.player.maxHp / 2;
      const hungerLow = state.player.hunger <= state.player.hungerMax / 2;
      if(state.invSize < ASAHIYAMA_INV_SIZE && (hpLow || hungerLow || state.player.poison) && Math.random() < 0.5) return "asahiyama";
      const inventoryFull = isInventoryFull();
      if(inventoryFull && Math.random() < 0.2) return "monsterHouse";
      return "normal";
    }

    function enemyPoolForFloor(){ return FLOOR_ENEMY_TABLES.find((row)=>state.floor>=row.min&&state.floor<=row.max).pool; }

    function spawnEnemy(type,x,y){
      const enemyKey = typeof type === "string" ? type : type?.key;
      const def = enemyDefByKey(enemyKey);
      if(!def) throw new Error(`Unknown enemy key: ${String(enemyKey)}`);
      const tier = floorPowerTier();

      // 後半のATK急上昇を抑える。
      // 以前は11階から実質的に強くなりすぎていたので、
      // 16階以降から緩やかに追加補正する。
      const lateAtkBonus = state.floor >= 16
        ? Math.floor((state.floor - 16) / 4) + 1
        : 0;

      return {
        x,
        y,
        id:def.id,
        key:def.key,
        char:def.char,
        exp:def.exp,
        score:def.score,
        dropRule:enemyDropRule(def),
        hp: def.baseHp + tier * 3 + Math.floor(Math.max(0, state.floor - 5) / 2),
        atk: def.baseAtk + Math.floor((tier + 3) / 2) + lateAtkBonus,
        def: def.baseDef + Math.floor((tier + 2) / 4),
        active:def.key!=="mimic"
      };
    }

    function placeEnemies(multiplier=1){
      const pool = randomFloorPos();

      const baseCount = randInt(2,3);
      const floorBonus = state.floor <= 10
        ? Math.floor((state.floor - 1) * 0.5)
        : 4 + Math.floor((state.floor - 10) * 0.3);

      const count = (baseCount + floorBonus) * multiplier;
      const enemyPool = enemyPoolForFloor();
      let placed = 0;

      for(const p of pool){
        if(placed >= count) break;
        if(Math.abs(p.x-state.player.x)+Math.abs(p.y-state.player.y) < 4) continue;
        if(p.x===state.ladder.x && p.y===state.ladder.y) continue;

        const enemyKey = weightedEnemyKey(enemyPool);
        state.enemies.push(spawnEnemy(enemyKey,p.x,p.y));
        placed++;
      }
    }


    function placeExtraLadderRoomEnemy(ladderRoom, multiplier=1){
      if(!ladderRoom) return;
      const enemyPool = enemyPoolForFloor();
      const candidates=[];
      for(let y=Math.max(1,ladderRoom.y-1); y<=Math.min(HEIGHT-2, ladderRoom.y+ladderRoom.h); y++){
        for(let x=Math.max(1,ladderRoom.x-1); x<=Math.min(WIDTH-2, ladderRoom.x+ladderRoom.w); x++){
          if(!positionFree(x,y)) continue;
          if(Math.abs(x-state.player.x)+Math.abs(y-state.player.y)<6) continue;
          candidates.push({x,y});
        }
      }
      if(!candidates.length) return;
      const shuffled = shuffle(candidates);
      let placed = 0;
      for(const picked of shuffled){
        if(placed >= multiplier) break;
        const enemyKey = weightedEnemyKey(enemyPool);
        state.enemies.push(spawnEnemy(enemyKey,picked.x,picked.y));
        placed += 1;
      }
    }

    function placeItems(itemCountOverride=null){
      const pool=randomFloorPos(); const itemCount=itemCountOverride ?? randInt(1,3); let placed=0;
      for(const p of pool){
        if(placed>=itemCount) break;
        const type=resolveDropType(FLOOR_ITEM_RULE);
        if(!type) continue;
        if(placeItemAt(type,p.x,p.y)) placed++;
      }
    }

    function placeTreasureEventObjects(){
      if(state.floor % 5 !== 0) return;
      const total = randInt(2,3);
      let pool = randomFloorPos().filter((p)=>Math.abs(p.x-state.player.x)+Math.abs(p.y-state.player.y)>=4&&positionFree(p.x,p.y));
      if(!pool.length) pool = randomFloorPos().filter((p)=>positionFree(p.x,p.y));
      let placed = 0;
      for(const p of pool){
        if(placed>=total) break;
        if(Math.random()<0.5) state.enemies.push(spawnEnemy("mimic", p.x, p.y));
        else state.floorObjects.push({x:p.x,y:p.y,key:"chest",char:SPRITES.mimic,trigger:"step",oneShot:true});
        placed += 1;
      }
    }



    function placeAsahiyama(){
      if(state.floorEventType !== "asahiyama") return;
      let pool = randomFloorPos().filter((p)=>positionFree(p.x,p.y));
      if(!pool.length) return;
      const picked = pool[randInt(0, pool.length-1)];
      state.floorObjects.push({x:picked.x,y:picked.y,key:"asahiyama",char:SPRITES.asahiyama,trigger:"step",oneShot:true});
    }

    function triggerAsahiyama(floorObject){
      if(!floorObject) return;
      if(state.invSize >= ASAHIYAMA_INV_SIZE) return;
      state.invSize = ASAHIYAMA_INV_SIZE;
      normalizeInventorySize();
      const healedHp = Math.max(0, state.player.maxHp - state.player.hp);
      state.player.hp = state.player.maxHp;
      state.player.hunger = state.player.hungerMax;
      if(healedHp>0) showDamagePopup(state.player.x, state.player.y, `+${healedHp}`, "heal");
      updateHungerWarning();
      addLog("『あさひやま効果』アイテムスロットが 1 増えた！（5→6）");
      addLog("あさひやまの恵みで HP と満腹度が全回復した！");

      const type = resolveDropType(FLOOR_ITEM_RULE);
      if(type && placeItemAtPlayerTile(type, floorObject.x, floorObject.y)){
        addLog(`${spriteForItemKey(type)}が落ちた。`);
      }
    }

    // ===== Drop resolution =====
    function isItemPlacable(type){
      return !(type==="shield"&&state.floorHasShield) && !(type==="axe"&&state.floorHasAxe);
    }

    function allowedDropTable(table){
      return (table || []).filter((row)=>isItemPlacable(itemKeyFromDropEntry(row)));
    }

    function resolveDropType(rule){
      if(!rule || rule.mode===DROP_MODE.NONE) return null;
      if(rule.chance !== undefined && Math.random() >= rule.chance) return null;

      if(rule.mode === DROP_MODE.FIXED) return isItemPlacable(rule.item) ? rule.item : null;

      if(rule.mode === DROP_MODE.PROFILE){
        const profilePool = allowedDropTable(DROP_PROFILES[rule.ref] || []);
        return rollFromTable(profilePool);
      }

      if(rule.mode === DROP_MODE.POOL){
        const pool = allowedDropTable(normalizeDropPool(rule.pool || []));
        return rollFromTable(pool);
      }

      return null;
    }

    function updateSeen(){
      ensureVisibilityGrid();
      for(let y=0;y<HEIGHT;y++) for(let x=0;x<WIDTH;x++) state.visibleNow[y][x]=false;
      if(state.revealed){
        for(let y=0;y<HEIGHT;y++){
          for(let x=0;x<WIDTH;x++){
            state.visibleNow[y][x]=true;
            state.seen[y][x]=true;
          }
        }
        return;
      }
      const radius=state.player.vision;
      for(let y=state.player.y-radius;y<=state.player.y+radius;y++){
        for(let x=state.player.x-radius;x<=state.player.x+radius;x++){
          if(x<0||y<0||x>=WIDTH||y>=HEIGHT) continue;
          if(Math.abs(x-state.player.x)+Math.abs(y-state.player.y)<=radius+2){
            state.visibleNow[y][x]=true;
            state.seen[y][x]=true;
          }
        }
      }
    }

    // ===== Render / UI =====
    function getCellChar(x, y, visibleNow, seen, hasMap){
      if(!visibleNow && !seen) return " ";

      let ch = hasMap && state.map[y] && state.map[y][x]===TILE_WALL ? SPRITES.wall : SPRITES.floor;
      if(visibleNow){
        if(state.ladder.x===x&&state.ladder.y===y) ch=SPRITES.ladder;
        const it=itemAt(x,y); if(it) ch=it.char;
        const floorObject=objectAt(x,y); if(floorObject) ch=floorObject.char;
        const en=enemyAt(x,y); if(en) ch=en.char;
      }
      if(state.player.x===x&&state.player.y===y) ch=SPRITES.player;
      return ch;
    }

    function getCameraOrigin(){
      // プレイヤー中心を基本に、端ではマップ外参照を避ける
      const maxX = Math.max(0, WIDTH - CAMERA_SIZE);
      const maxY = Math.max(0, HEIGHT - CAMERA_SIZE);
      const x = clamp(state.player.x - CAMERA_HALF, 0, maxX);
      const y = clamp(state.player.y - CAMERA_HALF, 0, maxY);
      return {x,y};
    }

    function worldToCamera(x,y){
      const camera = getCameraOrigin();
      const cx = x - camera.x;
      const cy = y - camera.y;
      return {
        x: cx,
        y: cy,
        inView: cx>=0 && cx<CAMERA_SIZE && cy>=0 && cy<CAMERA_SIZE
      };
    }

    function buildMapHtml(){
      const hasMap = state.map.length===HEIGHT;
      if(!hasMap) return Array.from({length:CAMERA_SIZE*CAMERA_SIZE}, ()=>`<div class="cell"> </div>`).join("");
      const cells=[];
      const camera = getCameraOrigin();
      for(let y=0;y<CAMERA_SIZE;y++){
        for(let x=0;x<CAMERA_SIZE;x++){
          const worldX = camera.x + x;
          const worldY = camera.y + y;
          const visibleNow = state.visibleNow[worldY][worldX];
          const seen = state.seen[worldY][worldX];
          const ch = getCellChar(worldX, worldY, visibleNow, seen, hasMap);
          cells.push(`<div class="cell">${ch}</div>`);
        }
      }
      return cells.join("");
    }

    function buildStatusHtml(){
      const status = state.player.poison ? '<span class="monster-alert">☠️POISON</span>' : "";
      const monsterAlert = state.floorEventType === "monsterHouse" ? '<span class="monster-alert">❗️モンスターハウス</span>' : "";
      const bossAlert = state.floor===30 ? '<span class="monster-alert">🌋 BOSS FLOOR</span>' : "";
      const atkText = formatBuffStat("ATK", state.player.baseAtk, playerAtkValue(), "🪓");
      const defText = formatBuffStat("DEF", state.player.baseDef, playerDefValue(), "💎");

      return `
        <div class="status-line line-top">
          <div class="status-pill">${playerName()}</div>
          <div class="status-pill">階 ${state.floor}</div>
          <div class="status-pill">Lv ${state.player.level}</div>
        </div>
        <div class="status-line line-mid">
          <div class="status-pill">イボ ${state.player.ibo}/${state.player.iboMax}</div>
          <div class="status-pill">${atkText}</div>
          <div class="status-pill">${defText}</div>
        </div>
        <div class="status-line line-exp">
          <div class="status-pill">EXP ${state.player.exp}/${expToNextLevel()}</div>
          <div class="status-pill">視界 ${state.player.vision}/${state.player.visionMax}</div>
        </div>
        <div class="status-alerts">${status} ${monsterAlert} ${bossAlert}</div>
        <div class="status-line line-gauge">
          ${gaugeHtml("HP", state.player.hp, state.player.maxHp)}
          ${gaugeHtml("満腹度", state.player.hunger, state.player.hungerMax)}
        </div>`;
    }

    function buildSystemInfoHtml(){
      const bestNameText = state.titleBestStar ? `⭐️${state.bestName}` : state.bestName;
      const bestText = `${state.bestScore}(${bestNameText})`;
      const debugStatus = DEBUG_BUILD
        ? `DEBUG_BUILD${state.debugMode ? " / DEBUG MODE ON" : ""}${state.debugFloorBuffer ? ` / JUMP: ${state.debugFloorBuffer}_` : ""}`
        : "RELEASE_BUILD";
      return `SCORE ${state.score} / BEST ${bestText} / SE ${state.soundEnabled ? "ON" : "OFF"}<br>${debugStatus}`;
    }

    function buildItemSlotsHtml(){
      normalizeInventorySize();
      return Array.from({length:6}, (_,idx)=>{
        const slot = state.inventory[idx];
        const itemText = slot ? slot.char : "▢";
        const keyText = `${idx+1}`;
        const emptyClass = slot ? "" : " empty";
        return `<div class="item-slot${emptyClass}"><div class="slot-key">${keyText}</div><div class="slot-item">${itemText}</div></div>`;
      }).join("");
    }

    function renderMiniMap(){

      if(!minimapCtx) return;
      minimapCtx.clearRect(0,0,MINIMAP_SIZE,MINIMAP_SIZE);
      minimapCtx.fillStyle = "#070707";
      minimapCtx.fillRect(0,0,MINIMAP_SIZE,MINIMAP_SIZE);

      for(let y=0;y<HEIGHT;y++){
        for(let x=0;x<WIDTH;x++){
          if(!state.seen[y][x]) continue;
          const tile = state.map[y]?.[x];
          if(!tile) continue;
          const visible = state.visibleNow[y][x];
          if(tile===TILE_WALL){
            minimapCtx.fillStyle = visible ? "#8c8c8c" : "#4f4f4f";
          } else {
            minimapCtx.fillStyle = visible ? "#6f6f6f" : "#2f2f2f";
          }
          minimapCtx.fillRect(x*MINIMAP_TILE, y*MINIMAP_TILE, MINIMAP_TILE, MINIMAP_TILE);
        }
      }

      if(state.ladder && state.seen[state.ladder.y]?.[state.ladder.x]){
        minimapCtx.fillStyle = "#f6d743";
        minimapCtx.fillRect(state.ladder.x*MINIMAP_TILE, state.ladder.y*MINIMAP_TILE, MINIMAP_TILE, MINIMAP_TILE);
      }

      for(const item of state.items){
        if(!state.visibleNow[item.y]?.[item.x]) continue;
        minimapCtx.fillStyle = "#2ecc71";
        minimapCtx.fillRect(item.x*MINIMAP_TILE, item.y*MINIMAP_TILE, MINIMAP_TILE, MINIMAP_TILE);
      }

      for(const enemy of state.enemies){
        if(!state.visibleNow[enemy.y]?.[enemy.x]) continue;
        minimapCtx.fillStyle = "#9b59b6";
        minimapCtx.fillRect(enemy.x*MINIMAP_TILE, enemy.y*MINIMAP_TILE, MINIMAP_TILE, MINIMAP_TILE);
      }

      minimapCtx.fillStyle = "#ff3b30";
      minimapCtx.fillRect(
        state.player.x*MINIMAP_TILE-1,
        state.player.y*MINIMAP_TILE-1,
        MINIMAP_TILE+2,
        MINIMAP_TILE+2
      );
    }

    function render(){
      state.score=calcScore(); updateSeen();
      mapEl.innerHTML=buildMapHtml();
      if(!mapEl.contains(projectileLayer)) mapEl.appendChild(projectileLayer);
      damagePopupLayer.textContent = "";
      if(!mapEl.contains(damagePopupLayer)) mapEl.appendChild(damagePopupLayer);
      renderMiniMap();
      statusEl.innerHTML = buildStatusHtml();
      if(systemInfoEl) systemInfoEl.innerHTML = buildSystemInfoHtml();
      if(itemSlotsEl) itemSlotsEl.innerHTML = buildItemSlotsHtml();
      applySharedUiScale();
      if(nameInputWrapEl){
        nameInputWrapEl.classList.toggle("show", state.editingName);
      }
      renderEndingOverlay();
    }

    // ===== Inventory =====
    function firstEmptySlot(){ normalizeInventorySize(); return state.inventory.findIndex((s)=>s===null); }
    function addToInventory(item){
      const idx=firstEmptySlot();
      if(idx===-1) return false;
      state.inventory[idx]=createItem(item.key);
      return true;
    }
    function grantStarterItem(){
      const type = resolveDropType(STARTER_DROP_RULE);
      if(!type) return null;
      if(!addToInventory(createItem(type))) return null;
      return type;
    }

    // ===== Battle / damage =====
    function applyDamage(target, amount, name="", shouldLog=true){ target.hp -= amount; if(shouldLog && name) addLog(`${name}に <span style="color:#ffb3b3">${amount}</span> ダメージ！`); }
    function applyPlayerDamage(amount){
      const damage = Math.max(0, Number(amount) || 0);
      if(damage<=0) return 0;
      applyDamage(state.player, damage, "", false);
      playSe("hit");
      return damage;
    }

    function playerHungerCritBonus(){
      const hungerRatio = state.player.hunger / state.player.hungerMax;
      if(hungerRatio >= 0.75) return 0.02;
      if(hungerRatio >= 0.5) return 0;
      if(hungerRatio >= 0.25) return -0.01;
      return -0.02;
    }

    function resolveAttackDamage(atk, def, isEnemyAttack, critMultiplier=1, attackerName="", targetName=""){
      const normal = calcDamage(atk, def);
      let damage = normal;
      let isCritical = false;
      const baseCritChance = isEnemyAttack ? 0.07 : (state.player.floorAtkBuff > 0 ? 0.12 : 0.07) + playerHungerCritBonus();
      const critChance = clamp01(baseCritChance * critMultiplier);
      if(Math.random() < critChance){
        isCritical = true;
        damage = Math.ceil(normal * 2.5);
        const from = attackerName || "こうげき";
        const to = targetName || "あいて";
        addLog(`💥<span style="color:#ffd6d6;font-weight:800;background:#7a0010;padding:0 4px;">【きゅうしょに　あたった！】${from}→${to}に ${damage}ダメージ！！</span>💥`);
      }
      if(isEnemyAttack && Math.random() < 0.5) damage += 1;
      return { damage, isCritical };
    }

    function activateMimic(enemy){
      const enemyKey = enemy.key;
      if(enemyKey === "mimic" && !enemy.active) enemy.active = true;
    }

    function playerAttack(enemy){
      const { damage, isCritical } = resolveAttackDamage(playerAtkValue(), enemy.def, false, 1, "プレイヤー", enemy.char);
      playSe("attack");
      activateMimic(enemy);
      applyDamage(enemy, damage, "", false);
      showDamagePopup(enemy.x, enemy.y, damage, isCritical ? "crit" : "normal");
      if(!isCritical) addLog(`${playerName()}は、${enemy.char}に <span style="color:#ffb3b3">${damage}</span> ダメージ！`);
      if(enemy.hp<=0) killEnemy(enemy);
    }

    function maybeLevelUp(){
      while(state.player.exp >= expToNextLevel()){
        state.player.exp -= expToNextLevel();
        state.player.level += 1;
        let atkUp = randInt(0,1);
        let defUp = randInt(0,1);
        const hpUp = randInt(2,3);
        if(atkUp + defUp === 0){
          if(Math.random() < 0.5) atkUp = 1;
          else defUp = 1;
        }
        const iboRateUp = randInt(1,2);
        state.player.baseAtk += atkUp;
        state.player.baseDef += defUp;
        state.player.maxHp += hpUp;
        state.player.hp = state.player.maxHp;
        state.player.iboChanceDenom = Math.max(
          state.player.iboChanceDenomMin,
          state.player.iboChanceDenom - iboRateUp
        );
        addLog(`レベルアップ！ ATK+${atkUp} DEF+${defUp} MAXHP+${hpUp} イボ率 1/${state.player.iboChanceDenom}`);
        playSe("levelup");
      }
    }

    function dropItemFromRule(x,y,rule){
      if(itemAt(x,y)) return;
      const type = resolveDropType(rule);
      if(!type) return;
      if(placeItemAt(type,x,y)) addLog(`${spriteForItemKey(type)}が落ちた。`);
    }
    function dropItemFromTable(x,y,dropTable){
      dropItemFromRule(x,y,{mode:DROP_MODE.POOL, pool:dropTable});
    }
    function dropItem(x,y,type){
      if(type){
        if(itemAt(x,y)) return;
        if(placeItemAt(type,x,y)) addLog(`${spriteForItemKey(type)}が落ちた。`);
        return;
      }
      dropItemFromRule(x,y,ENEMY_DEFAULT_DROP_RULE);
    }
    function removeRandomFoodItem(){
      const foodTypes = ["food","sushi","meat","feast"];
      const indexes = [];
      for(let i=0;i<state.inventory.length;i++) if(state.inventory[i] && foodTypes.includes(state.inventory[i].key)) indexes.push(i);
      if(!indexes.length) return false;
      const lostIndex = indexes[randInt(0,indexes.length-1)];
      state.inventory[lostIndex] = null;
      return true;
    }

    function killEnemy(enemy){
      state.enemies = state.enemies.filter((e)=>e!==enemy);
      const def = enemyDefFromInstance(enemy);
      const enemyKey = def?.key || enemy.key;
      if(enemyKey === "chick") addLog("🐥「たくましい子…」");
      else addLog(`${enemy.char}をたおした！`);
      if(state.kills[enemyKey]!==undefined) state.kills[enemyKey] += 1;
      state.player.exp += enemy.exp;
      if(enemyKey === "bossAsahiyama"){
        maybeLevelUp();
        state.bossCleared = true;
        state.clearLadder = {x:enemy.x, y:enemy.y};
        state.ladder = {x:enemy.x, y:enemy.y};
        addLog("大噴火あさひやま🌋を倒した❗️❗️");
        return;
      }
      const dropRule = enemy.dropRule || enemyDropRule(def || enemyKey);
      if(enemyKey === "mimic"){
        const type = resolveDropType(dropRule);
        if(type){
          const item = createItem(type);
          const itemDef = itemDefByKey(item.key);
          const pickupMode = itemDef?.pickupMode || ITEM_PICKUP_MODE.INVENTORY;
          const effect = itemDef ? ITEM_EFFECTS[itemDef.effectKey] : null;
          if(pickupMode === ITEM_PICKUP_MODE.INSTANT){
            if(effect) effect(item, -1, {source:"pickup"}).catch((error)=>console.error(error));
          }else if(addToInventory(item)) addLog(`${item.char}を手に入れた。(${invToString()})`);
          else if(placeItemAt(type, enemy.x, enemy.y)) addLog(`持ち物がいっぱいだ。${item.char}が落ちた。`);
        }
      }else{
        dropItemFromRule(enemy.x, enemy.y, dropRule);
      }
      maybeLevelUp();
    }

    function buildDeathMessage(causeInfo={cause:"generic"}){
      if(state.player.poison) return "あなたは毒に侵されて死んだ…。 Rで再開";
      if(causeInfo.cause === "enemy" && causeInfo.enemyChar) return `あなたは、${causeInfo.enemyChar}にトドメをさされ、力尽きた…。 Rで再開`;
      if(causeInfo.cause === "hunger") return "あなたは飢え、豪華な食事のまぼろしを見ながら倒れた…。 Rで再開";
      return "あなたは力尽きた…。 Rで再開";
    }

    function endAsGameOver(causeInfo={cause:"generic"}){ state.player.hp=Math.max(0,state.player.hp); state.gameOver=true; addLog(buildDeathMessage(causeInfo)); finalizeScore("GAME OVER"); }
    function enemyAttack(enemy){
      const enemyKey = enemy.key;
      if(enemyKey === "rain"){
        const roll = Math.random();
        if(roll < 0.06){
          state.player.vision = Math.max(state.player.visionMin, state.player.vision - 1);
          addLog("暗い雲につつまれた。");
        }
        else if(roll < 0.12){
          if(removeRandomFoodItem()) addLog("食料が豪雨に流された。");
        }
        else {
          state.player.hunger = Math.max(0, state.player.hunger - randInt(1, 2));
          updateHungerWarning();
          addLog("疲れた身体に降り注ぐ雨が、とても苛立つ。");
        }
        if(state.player.hp<=0) endAsGameOver({cause:"generic"});
        return;
      }

      // wizardの近接攻撃弱体化
      let attackPower = enemy.atk;
      if(enemyKey === "wizard"){
        attackPower = Math.max(1, enemy.atk - WIZARD_MELEE_ATK_PENALTY);
      }else if(enemyKey === "bossAsahiyama"){
        attackPower = enemy.atk;
      }

      const { damage, isCritical } = resolveAttackDamage(attackPower, playerDefValue(), true, enemyKey === "mimic" ? 2 : 1, enemy.char, "プレイヤー");
      applyPlayerDamage(damage);
      showDamagePopup(state.player.x, state.player.y, damage, isCritical ? "crit" : "normal");
      if(!isCritical) addLog(`${enemy.char}は、${playerName()}に <span style="color:#ffb3b3">${damage}</span> ダメージ！`);

      if(enemyKey === "lion" && state.player.hp > 0 && Math.random() < 0.15){
        const { damage: extraDamage, isCritical: extraCritical } = resolveAttackDamage(enemy.atk, playerDefValue(), true, 1, enemy.char, "プレイヤー");
        applyPlayerDamage(extraDamage);
        showDamagePopup(state.player.x, state.player.y, extraDamage, extraCritical ? "crit" : "normal");
        if(!extraCritical) addLog(`すばやい追撃をうけた！${extraDamage}ダメージ！！`);
      }

      if(enemyKey === "mimic" && state.player.hp>0 && Math.random()<0.05){
        state.player.baseAtk = Math.max(1, state.player.baseAtk - 1);
        addLog("攻撃力が下がった…");
      }

      if(enemyKey === "skull"){
        const before=state.player.exp; state.player.exp=Math.max(0,state.player.exp-damage); addLog(`${enemy.char}の呪い！ EXP-${before-state.player.exp}`);
        if(!state.player.diamondWard && Math.random()<0.2){ state.player.maxHp=Math.max(1,state.player.maxHp-1); if(state.player.hp>state.player.maxHp) state.player.hp=state.player.maxHp; addLog("最大HPが1減った…"); }
      }

      if(enemyKey === "ghost" && state.player.hp > 0 && Math.random() < 0.30){
        // 満腹を98%に（切り上げ）
        const beforeHunger = state.player.hunger;
        state.player.hunger = Math.ceil(state.player.hunger * 0.98);
        updateHungerWarning();

        // HPを1〜2減らす
        const extraHp = randInt(1, 2);
        applyPlayerDamage(extraHp);

        addLog(`${enemy.char}の冷気！ 満腹${beforeHunger}→${state.player.hunger} & 追加${extraHp}ダメージ！`);
      }
      if(enemyKey === "dragon" && state.player.hp>0 && Math.random()<0.5){
        const flame = Math.max(1, Math.ceil(state.player.hp * 0.12) - Math.floor(playerDefValue() / 3));
        applyPlayerDamage(flame);
        addLog(`${enemy.char}の炎！ 追加${flame}ダメージ！`);
      }
      if(enemyKey === "zombie" && state.player.hp>0 && !state.player.diamondWard){ const corrosion = Math.max(0, Math.min(damage * 2, 10) - randInt(0,2)); if(corrosion>0){ state.player.hungerMax=Math.max(1,state.player.hungerMax-corrosion); if(state.player.hunger>state.player.hungerMax) state.player.hunger=state.player.hungerMax; updateHungerWarning(); addLog(`${enemy.char}の腐食！ 最大満腹-${corrosion}`);} }
      if(enemyKey === "invader" && state.player.hp>0 && !state.player.diamondWard && Math.random()<0.1){ state.player.baseDef=Math.max(1,state.player.baseDef-1); addLog("防御力が下がった…"); }
      if((enemyKey === "spider" && Math.random()<0.2) || (enemyKey === "snake" && Math.random()<0.3)){
        if(state.player.hp>0 && !state.player.diamondWard){ state.player.poison=true; addLog("毒を受けた！"); playSe("poison"); }
      }

      if(state.player.hp<=0) endAsGameOver({cause:"enemy", enemyChar:enemy.char});
    }

    async function pickupItem(){
      const it = itemAt(state.player.x,state.player.y); if(!it) return;
      const def = itemDefByKey(it.key);
      const pickupMode = def?.pickupMode || ITEM_PICKUP_MODE.INVENTORY;
      const effect = def ? ITEM_EFFECTS[def.effectKey] : null;

      if(pickupMode === ITEM_PICKUP_MODE.INSTANT){
        state.items = state.items.filter((i)=>i!==it);
        playSe("item");
        if(effect) await effect(it, -1, {source:"pickup"});
        return;
      }

      if(!addToInventory(it)){ addLog("持ち物がいっぱいだ。"); return; }
      state.items = state.items.filter((i)=>i!==it);
      playSe("item");
      if(it.key === "poop" || it.char === "💩"){
        addLog("💩を拾った。");
        addLog("…これは、『かりんとう』というお菓子だ…");
      }else{
        addLog(`${it.char}を拾った。(${invToString()})`);
      }
    }


async function openChest(floorObject){
  if(!floorObject || floorObject.key!=="chest") return;

  const type = resolveDropType(CHEST_DROP_RULE);
  if(!type) return;
  const item = createItem(type);
  const def = itemDefByKey(item.key);
  const pickupMode = def?.pickupMode || ITEM_PICKUP_MODE.INVENTORY;
  const effect = def ? ITEM_EFFECTS[def.effectKey] : null;

  addLog("🎁宝箱を開けた！");
  playSe("item");

  if(pickupMode === ITEM_PICKUP_MODE.INSTANT){
    if(effect) await effect(item, -1, {source:"pickup"});
    return;
  }

  if(addToInventory(item)){
    addLog(`${item.char}を手に入れた。(${invToString()})`);
    return;
  }

  if(placeItemAtPlayerTile(item.key, state.player.x, state.player.y)) addLog(`持ち物がいっぱいだ。${item.char}が落ちた。`);
}

    async function triggerFloorObject(){
      const floorObject = objectAt(state.player.x,state.player.y);
      if(!floorObject || floorObject.trigger!=="step") return;

      if(floorObject.oneShot){
        state.floorObjects = state.floorObjects.filter((o)=>o!==floorObject);
      }

      if(floorObject.key === "asahiyama") triggerAsahiyama(floorObject);
      if(floorObject.key === "chest") await openChest(floorObject);
    }

    // ===== Items =====
    const ITEM_EFFECTS = {
      food: async ()=>{ state.player.hunger=Math.min(state.player.hungerMax,state.player.hunger+50); updateHungerWarning(); addLog("🍙を食べた！ 満腹+50"); return {consumed:true,endTurn:true}; },
      meat: async ()=>{ state.player.hunger=Math.min(state.player.hungerMax,state.player.hunger+100); updateHungerWarning(); addLog("🥩を食べた！ 満腹+100"); return {consumed:true,endTurn:true}; },
      sushi: async ()=>{
        state.player.hunger=Math.min(state.player.hungerMax,state.player.hunger+120);
        updateHungerWarning();
        const healHp=Math.ceil((state.player.maxHp-state.player.hp)/3);
        state.player.hp=Math.min(state.player.maxHp,state.player.hp+healHp);
        if(healHp>0) showDamagePopup(state.player.x, state.player.y, `+${healHp}`, "heal");
        addLog(`🍣を食べた！ 満腹+120 / HP+${healHp}`);
        return {consumed:true,endTurn:true};
      },
      feast: async ()=>{
        state.player.maxHp+=1;
        state.player.hungerMax+=25;
        state.player.hunger=Math.min(state.player.hungerMax,state.player.hunger+200);
        updateHungerWarning();
        const healHp=Math.ceil((state.player.maxHp-state.player.hp)/1.5);
        state.player.hp=Math.min(state.player.maxHp,state.player.hp+healHp);
        if(healHp>0) showDamagePopup(state.player.x, state.player.y, `+${healHp}`, "heal");
        addLog(`🍖を食べた！ 最大HP+1 & 最大満腹+25 & 満腹+200 / HP+${healHp}`);
        return {consumed:true,endTurn:true};
      },
      potion: async ()=>{
        const heal = Math.ceil(state.player.maxHp * 0.12 + 10 + randInt(-2,2));
        state.player.hp=Math.min(state.player.maxHp,state.player.hp+heal);
        if(heal>0) showDamagePopup(state.player.x, state.player.y, `+${heal}`, "heal");
        addLog(`🧪を使った！ HP+${heal}`);
        if(state.player.poison){ state.player.poison=false; addLog("解毒した。"); }
        return {consumed:true,endTurn:true};
      },
      map: async ()=>{ state.revealed=true; addLog("👁 地図を見通した！"); return {consumed:true,endTurn:true}; },
      sun: async (_item, _slotIndex, ctx={})=>{ state.player.vision = Math.min(state.player.visionMax, state.player.vision + 1); if(ctx.source==="pickup") instantPickupLog("🌤️", "視界+1"); else addLog("🌤️を使った！ 視界+1"); return {consumed:true,endTurn:true}; },
      shield: async (_item, _slotIndex, ctx={})=>{ state.player.baseDef+=1; if(ctx.source==="pickup") instantPickupLog("🛡️", "DEF+1"); else addLog("🛡️を装備した！ DEF+1（恒久）"); return {consumed:true,endTurn:true}; },
      axe: async ()=>{ applyFloorAtkBuffFromFinal(Math.ceil(playerAtkValue()*1.1+1)); addLog("🪓を装備した！ ATK強化（このフロアのみ）"); return {consumed:true,endTurn:true}; },
      diamond: async ()=>{ applyFloorDefBuffFromFinal(Math.ceil(playerDefValue()*1.1+1)); state.player.diamondWard=true; addLog("💎を装備した！ DEF強化（このフロアのみ）"); return {consumed:true,endTurn:true}; },
      dagger: async (_item, _slotIndex, ctx={})=>{ state.player.baseAtk+=1; if(ctx.source==="pickup") instantPickupLog("🗡️", "ATK+1"); else addLog("🗡️を装備した！ ATK+1（恒久）"); return {consumed:true,endTurn:true}; },
      star: async (_item, slotIndex)=>{ state.inventory[slotIndex]=null; await starBurst(); return {consumed:false,endTurn:false}; },
      scroll: async ()=>{
        const warpCandidates = [];
        const safeWarpCandidates = [];
        for(let y=0;y<HEIGHT;y++){
          for(let x=0;x<WIDTH;x++){
            if(!positionFree(x,y)) continue;
            warpCandidates.push({x,y});
            if(!hasEnemyWithinDistance(x,y,3)) safeWarpCandidates.push({x,y});
          }
        }
        if(safeWarpCandidates.length){
          const target = safeWarpCandidates[randInt(0, safeWarpCandidates.length-1)];
          state.player.x = target.x;
          state.player.y = target.y;
          addLog("📜転移の巻物を使った！ 安全な場所へワープ！");
          return {consumed:true,endTurn:true};
        }
        if(warpCandidates.length){
          const target = warpCandidates[randInt(0, warpCandidates.length-1)];
          state.player.x = target.x;
          state.player.y = target.y;
          addLog("📜転移の巻物を使った！ 近くに敵がいる場所へワープした！");
          return {consumed:true,endTurn:true};
        }
        addLog("📜転移先が見つからない！");
        return {consumed:false,endTurn:false};
      },
      poop: async ()=>{ const didFire = await poopShot(); return {consumed:didFire,endTurn:didFire}; },
      bean: async (_item, _slotIndex, ctx={})=>{
        if(state.player.iboMax>=state.player.iboMaxCap){
          if(ctx.source==="pickup") instantPickupLog("🫘", "これ以上イボは増やせない");
          else addLog("🫘これ以上イボは増やせない");
          return {consumed:true,endTurn:true};
        }
        state.player.iboMax++;
        if(ctx.source==="pickup") instantPickupLog("🫘", "イボ最大値+1");
        else addLog("🫘イボ最大値+1");
        return {consumed:true,endTurn:true};
      },
      bow: async ()=>{
        const didFire = await bowShot();
        return {consumed:false,endTurn:didFire};
      },
      wand: async ()=>{
        const didFire = await fireWandShot();
        if(!didFire) return {consumed:false,endTurn:false};
        const isBroken = Math.random() < 0.02;
        if(isBroken){
          addLog("🪄は、砕け散った❗️❗️");
          return {consumed:true,endTurn:true};
        }
        return {consumed:false,endTurn:true};
      }
    };

    async function useInventory(slotIndex){
      if(state.gameOver||state.inputLocked||slotIndex<0||slotIndex>=state.invSize) return;
      const slot = state.inventory[slotIndex]; if(!slot){ addLog(`スロット${slotIndex+1}は空だ。`); return; }
      const def = itemDefByKey(slot.key);
      const effect = def ? ITEM_EFFECTS[def.effectKey] : null;
      if(!effect){ addLog(`${slot.char}は使えない。`); return; }
      const result = await effect(slot, slotIndex, {source:"inventory"});
      if(result?.consumed) state.inventory[slotIndex]=null;
      if(result?.endTurn) endTurn();

    function canDropItemAtPlayerTile(){
      const x = state.player.x;
      const y = state.player.y;
      if(itemAt(x,y) || objectAt(x,y) || enemyAt(x,y)) return false;
      if(state.ladder.x===x && state.ladder.y===y) return false;
      if(state.clearLadder && state.clearLadder.x===x && state.clearLadder.y===y) return false;

    async function movePlayer(dx,dy,moveKey){
      if(state.gameOver||state.inputLocked) return;
      state.player.facing = {x:dx,y:dy};
      const nx=state.player.x+dx, ny=state.player.y+dy;
      if(!isWalkable(nx,ny)){
        state.blockedWallMoveKey = moveKey;
        return endTurn();
      }
      const foe = enemyAt(nx,ny); if(foe){ playerAttack(foe); return endTurn(); }
      state.blockedWallMoveKey = null;
      state.player.x=nx; state.player.y=ny; walkRegen();
      await triggerFloorObject();
      await pickupItem();
      if(nx===state.ladder.x&&ny===state.ladder.y){
        if(state.floor===30 && state.bossCleared && state.clearLadder && nx===state.clearLadder.x && ny===state.clearLadder.y){
          addLog("🪜 脱出した！");
          endAsGameClear();
          return;
        }
        state.floor+=1; addLog("🪜 次の階へ進む！"); playSe("stairs"); setupFloor(); return;

    const sleep = (ms)=>new Promise((resolve)=>setTimeout(resolve,ms));
    function getGridMetrics(){
      const rect = mapEl.getBoundingClientRect();
      const style = getComputedStyle(mapEl);
      const padX = parseFloat(style.paddingLeft) || 0;
      const padY = parseFloat(style.paddingTop) || 0;
      const cellW = (rect.width - padX * 2) / CAMERA_SIZE;
      const cellH = (rect.height - padY * 2) / CAMERA_SIZE;
      const cell = Math.min(cellW, cellH);
      return {padX, padY, cell};
    }

    function applySharedUiScale(){
      if(!gameScreenEl || !mapEl) return;
      const screenRect = gameScreenEl.getBoundingClientRect();
      const uiScale = screenRect.width / 1600;
      gameScreenEl.style.setProperty("--ui-scale", uiScale.toFixed(4));

      const mapRect = mapEl.getBoundingClientRect();
      const cell = mapRect.width / CAMERA_SIZE;
      const cellFontSize = Math.max(14, Math.floor(cell * 0.74));
      gameScreenEl.style.setProperty("--cell-font-size", `${cellFontSize}px`);

      const itemSlotEl = itemSlotsEl ? itemSlotsEl.querySelector(".item-slot") : null;
      if(itemSlotEl){
        const slotRect = itemSlotEl.getBoundingClientRect();
        const iconSize = Math.max(20, Math.floor(slotRect.height * 0.78));
        gameScreenEl.style.setProperty("--slot-icon-size", `${iconSize}px`);
      }
    }

      popup.className = `damage-popup damage-${type}`;

      popup.style.fontSize = `${Math.max(13, metrics.cell * 0.48)}px`;
      popup.style.left = `${metrics.padX + (pos.x + 0.5) * metrics.cell}px`;

    async function bowShot(){
      if(state.gameOver||state.inputLocked) return false;
      const facing = state.player.facing || {x:0,y:-1};
      if((facing.x===0 && facing.y===0) || (Math.abs(facing.x)+Math.abs(facing.y)!==1)){
        state.player.facing = {x:0,y:-1};
      }
      const dirX = state.player.facing.x;
      const dirY = state.player.facing.y;
      let hitEnemy = null;
      let hitDistance = 0;
      for(let dist=1;dist<=4;dist++){
        const tx = state.player.x + dirX*dist;
        const ty = state.player.y + dirY*dist;
        if(tx<0||tx>=WIDTH||ty<0||ty>=HEIGHT) break;
        if(!isWalkable(tx,ty)) break;
        const foe = enemyAt(tx,ty);
        if(foe && dist>=2){
          hitEnemy = foe;
          hitDistance = dist;
          break;
        }
      }
      if(!hitEnemy){
        addLog("いまは🏹を使っても意味がない！");
        render();
        return false;
      }
      state.inputLocked=true;
      const el=document.createElement("div");
      el.className="projectile";
      el.textContent = dirX!==0 ? "-" : "｜";
      let x=state.player.x;
      let y=state.player.y;
      setProjectilePos(el,x,y);
      projectileLayer.appendChild(el);
      try{
        for(let step=1;step<=hitDistance;step++){
          x += dirX;
          y += dirY;
          setProjectilePos(el,x,y);
          render();
          await sleep(PROJECTILE_STEP_MS);
        }
        const damage = Math.max(1, calcDamage(playerAtkValue()-3, hitEnemy.def));
        activateMimic(hitEnemy);
        applyDamage(hitEnemy, damage, hitEnemy.char);
        addLog(`🏹が${hitEnemy.char}に命中！ ${damage}ダメージ！`);
        if(hitEnemy.hp<=0) killEnemy(hitEnemy);
        render();
      } finally {
        el.remove();
        state.inputLocked=false;
      }
      return true;
    }

    async function fireWandShot(){
      if(state.gameOver||state.inputLocked) return false;
      const facing = state.player.facing || {x:0,y:-1};
      if((facing.x===0 && facing.y===0) || (Math.abs(facing.x)+Math.abs(facing.y)!==1)){
        state.player.facing = {x:0,y:-1};
      }
      const dirX = state.player.facing.x;
      const dirY = state.player.facing.y;
      const path = [];
      let hitWall = false;
      for(let dist=1;dist<=5;dist++){
        const tx = state.player.x + dirX*dist;
        const ty = state.player.y + dirY*dist;
        if(tx<0||tx>=WIDTH||ty<0||ty>=HEIGHT){
          hitWall = true;
          break;
        }
        if(!isWalkable(tx,ty)){
          hitWall = true;
          break;
        }
        if(dist>=2) path.push({x:tx,y:ty});
      }
      const hasTarget = path.some((cell)=>enemyAt(cell.x,cell.y));
      if(!hasTarget){
        addLog("🪄は今つかう意味がない。");
        render();
        return false;
      }
      addLog("🪄から炎が吹き出した🔥");
      playSe("beam");
      if(!path.length){
        addLog("炎は壁に阻まれた。");
        render();
        return true;
      }

      state.inputLocked=true;
      const flames=[];
      const hitSet = new Set();
      let hitCount = 0;
      try{
        for(const cell of path){
          const el=document.createElement("div");
          el.className="projectile";
          el.textContent=SPRITES.fire;
          setProjectilePos(el,cell.x,cell.y);
          projectileLayer.appendChild(el);
          flames.push(el);

          const en=enemyAt(cell.x,cell.y);
          if(en && !hitSet.has(en)){
            hitSet.add(en);
            // 満腹度依存: 満腹ほど強く、空腹だとほぼ通らない最低1ダメージ。
            const effectiveAtk = playerAtkValue() - 4 * hitCount;
            const fullnessRatio = clamp01(state.player.hunger / Math.max(1, state.player.hungerMax));
            const damage = Math.max(1, Math.floor(effectiveAtk * fullnessRatio));
            activateMimic(en);
            applyDamage(en, damage, "", false);
            addLog(`🔥が${en.char}を焼いた！ ${damage}ダメージ！`);
            hitCount += 1;
          }
          render();
          await sleep(Math.max(30, PROJECTILE_STEP_MS - 20));
        }
        if(hitWall) addLog("炎は壁でかき消えた。");
        for(const en of [...state.enemies]) if(en.hp<=0) killEnemy(en);
      } finally {
        await sleep(80);
        for(const el of flames) el.remove();
        state.inputLocked=false;
      }
      return true;
    }

    // ===== Enemy pathfinding =====
    const canSeePlayer = (ex,ey)=>Math.abs(ex-state.player.x)+Math.abs(ey-state.player.y)<=12;

    function bfsStep(startX,startY,goalX,goalY){
      const q=[{x:startX,y:startY}], came=new Map(), key=(x,y)=>`${x},${y}`; came.set(key(startX,startY), null);
      while(q.length){
        const cur=q.shift(); if(cur.x===goalX&&cur.y===goalY) break;
        for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
          const nx=cur.x+dx, ny=cur.y+dy, k=key(nx,ny);
          if(!isWalkable(nx,ny)||came.has(k)) continue;
          if(enemyAt(nx,ny)&&!(nx===goalX&&ny===goalY)) continue;
          came.set(k,cur); q.push({x:nx,y:ny});
        }
      }
      if(!came.has(key(goalX,goalY))) return null;
      let node={x:goalX,y:goalY}, prev=came.get(key(node.x,node.y));
      while(prev&&!(prev.x===startX&&prev.y===startY)){ node=prev; prev=came.get(key(node.x,node.y)); }
      return node;
    }

    // ===== Enemy AI =====
    function wizardLightningDir(enemy){
      const dx = state.player.x - enemy.x;
      const dy = state.player.y - enemy.y;
      if(dx!==0 && dy!==0) return null;
      const distance = Math.abs(dx) + Math.abs(dy);
      if(distance===0 || distance>3) return null;
      const stepX = dx===0 ? 0 : Math.sign(dx);
      const stepY = dy===0 ? 0 : Math.sign(dy);
      for(let i=1;i<=distance;i++){
        const tx = enemy.x + stepX*i;
        const ty = enemy.y + stepY*i;
        if(!isWalkable(tx,ty)) return null;
        if(i<distance && enemyAt(tx,ty)) return null;
      }
      return {dx:stepX,dy:stepY,distance};
    }

    async function wizardLightningAttack(enemy, shot){
      addLog("🧙‍♂️が雷を放った！");
      const el=document.createElement("div");
      el.className="projectile";
      el.textContent="⚡️";
      let x=enemy.x;
      let y=enemy.y;
      setProjectilePos(el,x,y);
      projectileLayer.appendChild(el);
      try{
        for(let i=0;i<shot.distance;i++){
          x += shot.dx;
          y += shot.dy;
          setProjectilePos(el,x,y);
          render();
          await sleep(PROJECTILE_STEP_MS);
          if(x===state.player.x && y===state.player.y){
            const { damage } = resolveAttackDamage(enemy.atk, playerDefValue(), true, 1, enemy.char, "プレイヤー");
            applyPlayerDamage(damage);
            addLog(`⚡️が${playerName()}に${damage}ダメージ！`);
            if(state.player.hp<=0){
              endAsGameOver({cause:"enemy", enemyChar:enemy.char});
            }
            break;
          }
        }
      } finally {
        el.remove();
      }
    }

    async function enemyTurn(){
      for(const en of state.enemies){
        const enemyKey = en.key;
        if(enemyKey === "mimic" && !en.active) continue;
        if(enemyKey === "bossAsahiyama"){
          const dist = Math.abs(en.x-state.player.x)+Math.abs(en.y-state.player.y);
          if(dist===1){
            enemyAttack(en);
            if(state.gameOver) return;
            continue;
          }
          // MVP炎攻撃: 射程内で確率発動する単純な固定火力
          if(dist>=2 && dist<=5 && Math.random()<0.35){
            const fireDamage = Math.max(1, calcDamage(en.atk + 3, playerDefValue()) + 2);
            applyPlayerDamage(fireDamage);
            addLog(`🌋あさひやまの灼熱弾！ ${playerName()}に${fireDamage}ダメージ！`);
            if(state.player.hp<=0) endAsGameOver({cause:"enemy", enemyChar:en.char});
            if(state.gameOver) return;
            continue;
          }
          continue;
        }
        if(enemyKey === "wizard"){
          const shot = wizardLightningDir(en);
          if(shot && Math.random()<0.5){
            await wizardLightningAttack(en, shot);
            if(state.gameOver) return;
            continue;
          }
        }
        if(Math.abs(en.x-state.player.x)+Math.abs(en.y-state.player.y)===1){
          if(enemyKey === "chick"){
            const lines = [
              "🐥「ぎゃあああ！…『思いやり』は無いの！？」",
              "🐥「もしかして、僕を攻撃することで『進んで学習』をしてる？」"
            ];
            addLog(lines[Math.floor(Math.random()*lines.length)]);
            continue;
          }
          enemyAttack(en);
          if(state.gameOver) return;
          continue;
        }
        let moved=false;
        if(canSeePlayer(en.x,en.y)){
          const step=bfsStep(en.x,en.y,state.player.x,state.player.y);
          if(step&&!(step.x===state.player.x&&step.y===state.player.y)&&!enemyAt(step.x,step.y)){ en.x=step.x; en.y=step.y; moved=true; }
        }
        if(!moved){
          for(const [dx,dy] of shuffle([[1,0],[-1,0],[0,1],[0,-1]])){
            const nx=en.x+dx, ny=en.y+dy;
            if(!isWalkable(nx,ny)||enemyAt(nx,ny)||(nx===state.player.x&&ny===state.player.y)) continue;
            en.x=nx; en.y=ny; break;
          }
        }
      }
    }

    function hungerTurn(){
      const extra = Math.random() < Math.min(0.2, Math.max(0,state.floor-5)*0.02) ? 1 : 0;
      let consume = 1 + extra;
      if(state.player.poison) consume *= 2;
      state.player.hunger = Math.max(0, state.player.hunger - consume);
      updateHungerWarning();
      state.starving = state.player.hunger === 0;
      if(state.starving){
        applyPlayerDamage(1); addLog("大ピンチ！ 空腹ダメージ1");
        if(state.player.hp<=0) endAsGameOver({cause:"hunger"});
      }
    }

    function iboTurn(){
      if(state.iboCooldown>0) state.iboCooldown -= 1;
      if(state.player.hunger<=0||state.player.ibo>=state.player.iboMax||state.iboCooldown!==0) return;
      if(Math.random()<1/state.player.iboChanceDenom){ state.player.ibo += 1; state.iboCooldown = 10; addLog("【イボがはえた！】"); }
    }

    async function endTurn(){
      if(state.gameOver || state.gameClear) return;
      state.turns+=1;
      state.inputLocked=true;
      await enemyTurn();
      if(state.gameOver || state.gameClear){ state.inputLocked=false; return render(); }
      hungerTurn();
      if(state.gameOver || state.gameClear){ state.inputLocked=false; return render(); }
      iboTurn();
      state.inputLocked=false;
      render();
    }
